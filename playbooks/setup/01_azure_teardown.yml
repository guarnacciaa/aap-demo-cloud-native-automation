# Description: Delete Azure resources created by 01_azure_setup.yml and the demo scenario.
# Always removes:
#   - the job schedule link and schedule created by azure_runbook_schedule.yml (if run)
#   - the demo runbook created by 01_azure_setup.yml
# When azure_create_automation_account is true, also deletes the Automation Account
# and resource group that were provisioned by the setup playbook (cascades all remaining
# objects, so the explicit schedule/runbook deletions above are redundant but harmless).
# Requires demo_cleanup_confirm=true to prevent accidental deletion.
# Run after aap_cleanup.yml has removed the Controller objects.
---
- name: Remove sample Azure Automation runbook
  hosts: localhost
  gather_facts: false
  collections:
    - ansible.builtin
  vars_files:
    - ../../vault.yml
    - ../../group_vars/all/demo_variables.yml

  vars:
    azure_arm_api_version: "2024-10-23"

  pre_tasks:
    - name: Require demo_cleanup_confirm=true before deleting Azure runbook
      ansible.builtin.assert:
        that:
          - demo_cleanup_confirm | default(false) | bool
        fail_msg: Pass -e demo_cleanup_confirm=true to run Azure teardown.
      tags:
        - always

    - name: Resolve Azure credentials from AAP credential injection or Ansible variables
      # When this playbook runs as an AAP job template with an Azure Service Principal
      # credential attached, the controller injects AZURE_TENANT, AZURE_CLIENT_ID,
      # AZURE_SECRET, and AZURE_SUBSCRIPTION_ID as environment variables rather than
      # Ansible variables. This task resolves all four from whichever source is populated
      # so the URI token request works in both local (vault) and AAP (credential) modes.
      ansible.builtin.set_fact:
        azure_subscription_id: >-
          {{ azure_subscription_id
             if (azure_subscription_id | default('')) | length > 0
                and azure_subscription_id != 'CHANGE_ME'
             else lookup('env', 'AZURE_SUBSCRIPTION_ID') }}
        azure_tenant_id: >-
          {{ azure_tenant_id
             if (azure_tenant_id | default('')) | length > 0
                and azure_tenant_id != 'CHANGE_ME'
             else lookup('env', 'AZURE_TENANT') }}
        azure_client_id: >-
          {{ azure_client_id
             if (azure_client_id | default('')) | length > 0
             else lookup('env', 'AZURE_CLIENT_ID') }}
        azure_client_secret: >-
          {{ azure_client_secret
             if (azure_client_secret | default('')) | length > 0
             else lookup('env', 'AZURE_SECRET') }}
      no_log: "{{ demo_no_log | default(true) }}"
      tags:
        - always

  tasks:
    - name: Obtain Azure AD access token for Resource Manager
      ansible.builtin.uri:
        url: "https://login.microsoftonline.com/{{ azure_tenant_id }}/oauth2/v2.0/token"
        method: POST
        body_format: form-urlencoded
        body:
          grant_type: client_credentials
          client_id: "{{ azure_client_id }}"
          client_secret: "{{ azure_client_secret }}"
          scope: https://management.azure.com/.default
        status_code: 200
      register: azure_token
      no_log: "{{ demo_no_log | default(true) }}"
      tags:
        - azure
        - auth

    # =========================================================================
    # Clean up objects created by the azure_runbook_schedule.yml demo scenario.
    # These objects live inside the Automation Account and must be explicitly
    # removed in bring-your-own mode (the account itself is not deleted there).
    # In create-from-scratch mode the account deletion cascades them, but
    # removing them first is harmless — 404 is accepted on both tasks.
    #
    # Deletion order: job schedule link first (it references both the schedule
    # and the runbook), then the schedule, then the runbook.
    # =========================================================================

    - name: Compute job schedule link UUID for teardown
      # Reproduces the same UUID that azure_runbook_schedule.yml used when creating
      # the job schedule link: azure_job_schedule_name | to_uuid.
      # Required because the ARM job schedule endpoint uses the UUID as the resource name.
      # azure_job_schedule_name is passed as an explicit extra_var by the job template.
      ansible.builtin.set_fact:
        _azure_job_schedule_uuid: "{{ azure_job_schedule_name | to_uuid }}"
      tags:
        - azure
        - teardown

    - name: Delete Azure Automation job schedule link created by azure_runbook_schedule.yml
      # The job schedule link binds the schedule to the runbook. It must be deleted
      # before the schedule and the runbook because it holds references to both.
      # 404 is acceptable — the link may not exist if the demo scenario was never run.
      ansible.builtin.uri:
        url: >-
          https://management.azure.com/subscriptions/{{ azure_subscription_id
          }}/resourceGroups/{{ azure_automation_resource_group
          }}/providers/Microsoft.Automation/automationAccounts/{{ azure_automation_account
          }}/jobSchedules/{{ _azure_job_schedule_uuid }}?api-version={{ azure_arm_api_version }}
        method: DELETE
        headers:
          Authorization: "Bearer {{ azure_token.json.access_token }}"
        status_code:
          - 200
          - 204
          - 404
      tags:
        - azure
        - teardown

    - name: Delete Azure Automation schedule created by azure_runbook_schedule.yml
      # The schedule (recurrence definition) is a separate resource from the job
      # schedule link. It can only be deleted after the link that references it is gone.
      # 404 is acceptable — the schedule may not exist if the scenario was never run.
      ansible.builtin.uri:
        url: >-
          https://management.azure.com/subscriptions/{{ azure_subscription_id
          }}/resourceGroups/{{ azure_automation_resource_group
          }}/providers/Microsoft.Automation/automationAccounts/{{ azure_automation_account
          }}/schedules/{{ azure_job_schedule_name }}-schedule?api-version={{ azure_arm_api_version }}
        method: DELETE
        headers:
          Authorization: "Bearer {{ azure_token.json.access_token }}"
        status_code:
          - 200
          - 204
          - 404
      tags:
        - azure
        - teardown

    - name: Delete sample runbook from Automation Account
      # 404 is acceptable — runbook may already be gone or was never created.
      ansible.builtin.uri:
        url: >-
          https://management.azure.com/subscriptions/{{ azure_subscription_id
          }}/resourceGroups/{{ azure_automation_resource_group
          }}/providers/Microsoft.Automation/automationAccounts/{{ azure_automation_account
          }}/runbooks/{{ azure_runbook_name }}?api-version={{ azure_arm_api_version }}
        method: DELETE
        headers:
          Authorization: "Bearer {{ azure_token.json.access_token }}"
        status_code:
          - 200
          - 204
          - 404
      tags:
        - azure
        - teardown

    # Delete the Automation Account and resource group only when they were provisioned
    # by 01_azure_setup.yml (create-from-scratch mode). In bring-your-own mode these
    # objects pre-existed and must not be removed here.
    - name: Delete Azure Automation Account created by 01_azure_setup.yml
      ansible.builtin.uri:
        url: >-
          https://management.azure.com/subscriptions/{{ azure_subscription_id
          }}/resourceGroups/{{ azure_automation_resource_group
          }}/providers/Microsoft.Automation/automationAccounts/{{ azure_automation_account
          }}?api-version={{ azure_arm_api_version }}
        method: DELETE
        headers:
          Authorization: "Bearer {{ azure_token.json.access_token }}"
        status_code:
          - 200
          - 202
          - 204
          - 404
      when: azure_create_automation_account | default(false) | bool
      tags:
        - azure
        - teardown

    - name: Delete Azure resource group created by 01_azure_setup.yml
      # Deleting the resource group removes all resources inside it.
      # 202 is the expected response for async deletion; 404 means already gone.
      ansible.builtin.uri:
        url: >-
          https://management.azure.com/subscriptions/{{ azure_subscription_id
          }}/resourcegroups/{{ azure_automation_resource_group
          }}?api-version=2021-04-01
        method: DELETE
        headers:
          Authorization: "Bearer {{ azure_token.json.access_token }}"
        status_code:
          - 200
          - 202
          - 204
          - 404
      when: azure_create_automation_account | default(false) | bool
      tags:
        - azure
        - teardown

    - name: Report Azure teardown completion
      ansible.builtin.debug:
        msg: >-
          Job schedule link, schedule '{{ azure_job_schedule_name }}-schedule', and
          runbook '{{ azure_runbook_name }}' removed from '{{ azure_automation_account }}'
          (404 on any of these means the object was already absent — acceptable).
          {% if azure_create_automation_account | default(false) | bool %}
          Automation Account '{{ azure_automation_account }}' and resource group
          '{{ azure_automation_resource_group }}' deletion initiated (async — may take
          a few minutes to complete in Azure).
          {% else %}
          The Automation Account and resource group were not deleted (bring-your-own mode).
          {% endif %}
      tags:
        - azure
        - teardown
