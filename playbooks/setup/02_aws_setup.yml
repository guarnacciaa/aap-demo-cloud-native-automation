# Description: Create AWS supporting resources for the cloud-native automation demo.
# Creates: SSM Automation document, EC2 instance with SSM agent, maintenance window.
# Run before aap_config.yml. Teardown counterpart: 02_aws_teardown.yml
#
# Two modes controlled by aws_create_network_resources (demo_variables.yml):
#   false (default) — bring-your-own: aws_ec2_vpc_subnet_id, aws_ec2_security_group_ids,
#                     and aws_ec2_iam_instance_profile must reference existing resources.
#   true            — create-from-scratch: VPC, subnet, internet gateway, route table,
#                     security group, IAM role, and instance profile are created here.
#                     Teardown counterpart removes all of these objects.
#
# After this playbook completes:
#   1. Copy the printed EC2 instance ID into aws_ssm_target_instance_id in demo_variables.yml.
#   2. Copy the printed maintenance window ID into aws_ssm_maintenance_window_id.
---
- name: Create AWS SSM resources for cloud-native automation demo
  hosts: localhost
  gather_facts: false
  collections:
    - amazon.aws
    - ansible.builtin
  vars_files:
    - ../../vault.yml
    - ../../group_vars/all/demo_variables.yml

  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_key }}"
    AWS_DEFAULT_REGION: "{{ aws_region }}"

  pre_tasks:
    # Fail fast before touching AWS when required inputs are missing.
    # Each mode requires a distinct set of variables to be populated.
    - name: Validate bring-your-own network variables
      ansible.builtin.assert:
        that:
          - aws_ec2_vpc_subnet_id != "CHANGE_ME"
          - aws_ec2_security_group_ids | reject('equalto', 'CHANGE_ME') | list | length > 0
          - aws_ec2_iam_instance_profile != "CHANGE_ME"
        fail_msg: >-
          aws_create_network_resources is false. Set aws_ec2_vpc_subnet_id,
          aws_ec2_security_group_ids, and aws_ec2_iam_instance_profile in
          demo_variables.yml to reference pre-existing resources, or set
          aws_create_network_resources: true to create them from scratch.
      when: not (aws_create_network_resources | default(false) | bool)
      tags:
        - always

    - name: Validate create-from-scratch network variables
      ansible.builtin.assert:
        that:
          - aws_vpc_name is defined and aws_vpc_name | length > 0
          - aws_vpc_cidr is defined and aws_vpc_cidr | length > 0
          - aws_subnet_name is defined and aws_subnet_name | length > 0
          - aws_subnet_cidr is defined and aws_subnet_cidr | length > 0
          - aws_sg_name is defined and aws_sg_name | length > 0
          - aws_iam_role_name is defined and aws_iam_role_name | length > 0
        fail_msg: >-
          aws_create_network_resources is true but one or more create-from-scratch
          variables (aws_vpc_name, aws_vpc_cidr, aws_subnet_name, aws_subnet_cidr,
          aws_sg_name, aws_iam_role_name) are missing from demo_variables.yml.
      when: aws_create_network_resources | default(false) | bool
      tags:
        - always

    - name: Validate EC2 AMI ID is set
      # Fails fast before any AWS call — avoids a 10-minute wait for SSM registration
      # that will never succeed if the AMI ID was never filled in.
      # Use an Amazon Linux 2023 or RHEL AMI; SSM agent bootstrap in user_data handles
      # the case where the agent is not pre-installed on the chosen AMI.
      ansible.builtin.assert:
        that:
          - aws_ec2_ami_id is defined
          - aws_ec2_ami_id != "CHANGE_ME"
        fail_msg: >-
          aws_ec2_ami_id must be set to a valid AMI ID for region {{ aws_region }}.
          Recommended: use an Amazon Linux 2023 or RHEL AMI that includes SSM agent.
          Look up current AMIs at:
          https://console.aws.amazon.com/ec2/v2/home#Images:visibility=public-images
      tags:
        - always

  tasks:
    # =========================================================================
    # 0a. Always: retrieve AWS account ID from STS
    #     Runs in both modes so the operator can copy the value into
    #     demo_variables.yml without running a separate CLI command.
    # =========================================================================

    - name: Retrieve AWS account ID via boto3 (no awscli required)
      # amazon.aws.aws_caller_info uses boto3 directly — does not require awscli
      # to be installed on the control node. Returns account, arn, and user_id.
      amazon.aws.aws_caller_info:
      register: sts_info
      changed_when: false
      tags:
        - aws
        - setup

    - name: Set aws_account_id fact from caller info
      ansible.builtin.set_fact:
        resolved_aws_account_id: "{{ sts_info.account }}"
      tags:
        - aws
        - setup

    # =========================================================================
    # 0b. Conditional: create network and IAM resources from scratch
    #     Skipped entirely when aws_create_network_resources is false.
    # =========================================================================

    - name: Create VPC for the demo environment
      amazon.aws.ec2_vpc_net:
        name: "{{ aws_vpc_name }}"
        cidr_block: "{{ aws_vpc_cidr }}"
        region: "{{ aws_region }}"
        tags:
          demo: cloud-native-automation
          managed_by: ansible
        state: present
      register: aws_vpc_result
      when: aws_create_network_resources | default(false) | bool
      tags:
        - aws
        - network

    - name: Create subnet within the demo VPC
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ aws_vpc_result.vpc.id }}"
        cidr: "{{ aws_subnet_cidr }}"
        region: "{{ aws_region }}"
        map_public: true
        tags:
          Name: "{{ aws_subnet_name }}"
          demo: cloud-native-automation
          managed_by: ansible
        state: present
      register: aws_subnet_result
      when: aws_create_network_resources | default(false) | bool
      tags:
        - aws
        - network

    - name: Create internet gateway for outbound SSM agent connectivity
      # SSM agent initiates outbound HTTPS connections to AWS SSM endpoints;
      # an internet gateway is required when instances are in a public subnet.
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ aws_vpc_result.vpc.id }}"
        region: "{{ aws_region }}"
        tags:
          Name: "{{ aws_vpc_name }}-igw"
          demo: cloud-native-automation
          managed_by: ansible
        state: present
      register: aws_igw_result
      when: aws_create_network_resources | default(false) | bool
      tags:
        - aws
        - network

    - name: Create route table with default route through the internet gateway
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ aws_vpc_result.vpc.id }}"
        region: "{{ aws_region }}"
        subnets:
          - "{{ aws_subnet_result.subnet.id }}"
        routes:
          - dest: 0.0.0.0/0
            gateway_id: "{{ aws_igw_result.gateway_id }}"
        tags:
          Name: "{{ aws_vpc_name }}-rt"
          demo: cloud-native-automation
          managed_by: ansible
        state: present
      when: aws_create_network_resources | default(false) | bool
      tags:
        - aws
        - network

    - name: Create security group for the SSM-managed EC2 instance
      # No inbound rules are needed; SSM agent initiates all communication outbound.
      # purge_rules_egress: false preserves the AWS default allow-all-outbound rule,
      # which is required for SSM agent to reach the service endpoints.
      amazon.aws.ec2_security_group:
        name: "{{ aws_sg_name }}"
        description: Security group for cloud-native automation demo SSM target
        vpc_id: "{{ aws_vpc_result.vpc.id }}"
        region: "{{ aws_region }}"
        purge_rules_egress: false
        tags:
          demo: cloud-native-automation
          managed_by: ansible
        state: present
      register: aws_sg_result
      when: aws_create_network_resources | default(false) | bool
      tags:
        - aws
        - network

    - name: Create IAM role with AmazonSSMManagedInstanceCore for EC2 SSM access
      # create_instance_profile: true creates an instance profile with the same
      # name as the role; the EC2 instance references this profile to register
      # with SSM. The role trusts ec2.amazonaws.com for AssumeRole.
      amazon.aws.iam_role:
        name: "{{ aws_iam_role_name }}"
        assume_role_policy_document:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Service: ec2.amazonaws.com
              Action: sts:AssumeRole
        managed_policies:
          - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        create_instance_profile: true
        state: present
      register: aws_iam_role_result
      when: aws_create_network_resources | default(false) | bool
      tags:
        - aws
        - iam

    - name: Create IAM service role for SSM maintenance window task execution
      # This is a different role from the EC2 instance profile above.
      # SSM assumes this role (trust: ssm.amazonaws.com) to call
      # ssm:StartAutomationExecution when the maintenance window fires.
      # AmazonSSMAutomationRole is the AWS-managed policy for this purpose.
      amazon.aws.iam_role:
        name: "{{ aws_ssm_service_role_name }}"
        assume_role_policy_document:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Service: ssm.amazonaws.com
              Action: sts:AssumeRole
        managed_policies:
          - arn:aws:iam::aws:policy/service-role/AmazonSSMAutomationRole
        state: present
      register: aws_ssm_service_role_result
      when: aws_create_network_resources | default(false) | bool
      tags:
        - aws
        - iam

    # Resolve all mode-dependent launch parameters into a single set of facts
    # consumed by the EC2 task and the output section below.
    # This avoids duplicating the ec2_instance task and the set_stats task.
    - name: Resolve EC2 launch parameters and SSM service role from the active mode
      ansible.builtin.set_fact:
        ec2_launch_subnet_id: >-
          {{ aws_subnet_result.subnet.id
             if (aws_create_network_resources | default(false) | bool)
             else aws_ec2_vpc_subnet_id }}
        ec2_launch_sg_ids: >-
          {{ [aws_sg_result.group_id]
             if (aws_create_network_resources | default(false) | bool)
             else aws_ec2_security_group_ids }}
        ec2_launch_iam_profile: >-
          {{ aws_iam_role_name
             if (aws_create_network_resources | default(false) | bool)
             else aws_ec2_iam_instance_profile }}
        resolved_ssm_service_role_arn: >-
          {{ aws_ssm_service_role_result.iam_role.arn
             if (aws_create_network_resources | default(false) | bool)
             else aws_ssm_service_role_arn }}
      tags:
        - aws
        - ec2

    # =========================================================================
    # 1. SSM Automation document
    # =========================================================================

    - name: Write SSM Automation document content to a temporary file
      # Writing to a file avoids shell quoting problems with inline JSON.
      # The document runs a simple shell script on the target EC2 instance
      # via aws:runCommand — valid for demonstrating SSM execution and output.
      ansible.builtin.copy:
        dest: /tmp/aap-demo-ssm-document.json
        mode: "0600"
        content: |
          {
            "schemaVersion": "0.3",
            "description": "AAP cloud-native automation demo: run diagnostics on EC2 target",
            "parameters": {
              "InstanceId": {
                "type": "String",
                "description": "Target EC2 instance ID"
              }
            },
            "mainSteps": [
              {
                "name": "runDiagnostics",
                "action": "aws:runCommand",
                "inputs": {
                  "DocumentName": "AWS-RunShellScript",
                  "InstanceIds": ["{{ '{{' }} InstanceId {{ '}}' }}"],
                  "Parameters": {
                    "commands": [
                      "echo 'AAP cloud-native automation demo executed at: '$(date -u)",
                      "hostname",
                      "uptime",
                      "echo 'SSM agent version: '$(amazon-ssm-agent -version 2>/dev/null || ssm-agent -version 2>/dev/null || echo unknown)"
                    ]
                  }
                }
              }
            ]
          }
      tags:
        - aws
        - ssm

    - name: Create SSM Automation document
      # aws ssm create-document fails with DuplicateDocumentContent when the document
      # already exists with identical content — treated as success (idempotent).
      ansible.builtin.command:
        cmd: >-
          aws ssm create-document
          --name {{ aws_ssm_document_name }}
          --document-type Automation
          --document-format JSON
          --content file:///tmp/aap-demo-ssm-document.json
          --region {{ aws_region }}
          --output json
      register: ssm_doc_create
      changed_when: ssm_doc_create.rc == 0
      failed_when:
        - ssm_doc_create.rc != 0
        - "'DocumentAlreadyExists' not in ssm_doc_create.stderr"
        - "'DuplicateDocumentContent' not in ssm_doc_create.stderr"
      tags:
        - aws
        - ssm

    - name: Remove temporary SSM document file
      ansible.builtin.file:
        path: /tmp/aap-demo-ssm-document.json
        state: absent
      tags:
        - aws
        - ssm

    # =========================================================================
    # 2. EC2 target instance
    # =========================================================================

    - name: Launch EC2 instance as SSM automation target
      # amazon.aws.ec2_instance is certified; preferred over community.aws alternatives.
      # The instance must join the SSM managed-instance inventory via its IAM profile.
      # ec2_launch_subnet_id, ec2_launch_sg_ids, and ec2_launch_iam_profile are
      # resolved above from either the bring-your-own or create-from-scratch mode.
      # key_name is omitted when aws_ec2_key_name is unset or left as CHANGE_ME;
      # SSM-only access does not require a key pair.
      # user_data installs and starts the SSM agent as a safety net for AMIs where the
      # agent is absent or disabled; it is harmless on AMIs where the agent already runs.
      amazon.aws.ec2_instance:
        name: "{{ aws_ec2_instance_name }}"
        instance_type: "{{ aws_ec2_instance_type }}"
        image_id: "{{ aws_ec2_ami_id }}"
        vpc_subnet_id: "{{ ec2_launch_subnet_id }}"
        key_name: >-
          {{ aws_ec2_key_name
             if (aws_ec2_key_name | default('') not in ['', 'CHANGE_ME'])
             else omit }}
        security_groups: "{{ ec2_launch_sg_ids }}"
        iam_instance_profile: "{{ ec2_launch_iam_profile }}"
        user_data: |
          #!/bin/bash
          # Install and start the SSM agent on first boot.
          # Covers Amazon Linux 2023/2 (dnf/yum), RHEL/CentOS (yum/dnf), and Ubuntu (snap).
          if command -v dnf &>/dev/null; then
              dnf install -y amazon-ssm-agent
          elif command -v yum &>/dev/null; then
              yum install -y amazon-ssm-agent
          elif command -v apt-get &>/dev/null; then
              snap install amazon-ssm-agent --classic 2>/dev/null || apt-get install -y amazon-ssm-agent
          fi
          systemctl enable amazon-ssm-agent
          systemctl start amazon-ssm-agent
        state: running
        wait: true
        tags:
          Name: "{{ aws_ec2_instance_name }}"
          demo: cloud-native-automation
          managed_by: ansible
      register: ec2_result
      tags:
        - aws
        - ec2

    - name: Store EC2 instance ID
      ansible.builtin.set_fact:
        provisioned_instance_id: "{{ ec2_result.instances[0].instance_id }}"
      tags:
        - aws
        - ec2

    # Block/rescue so a timeout produces actionable diagnostics rather than a raw
    # JSON dump. The SSM agent registers asynchronously after boot; 20 retries ×
    # 30 s = 10 minutes is enough for most AMIs. If it expires, common causes are:
    #   1. AMI did not have SSM agent and user_data bootstrap failed (check /var/log/cloud-init-output.log).
    #   2. IAM instance profile lacks AmazonSSMManagedInstanceCore.
    #   3. Outbound HTTPS (port 443) to ssm.REGION.amazonaws.com is blocked.
    - name: Wait for SSM agent to register the instance
      block:
        - name: Poll SSM managed-instance inventory until agent appears
          ansible.builtin.command:
            cmd: >-
              aws ssm describe-instance-information
              --filters Key=InstanceIds,Values={{ provisioned_instance_id }}
              --region {{ aws_region }}
              --output json
          register: ssm_agent_check
          until: (ssm_agent_check.stdout | from_json).InstanceInformationList | length > 0
          retries: 20
          delay: 30
          changed_when: false
          tags:
            - aws
            - ec2
      rescue:
        - name: SSM agent registration timed out — print diagnostic checklist
          ansible.builtin.fail:
            msg:
              - "SSM agent did not register for instance {{ provisioned_instance_id }} after 10 minutes."
              - "Run these checks before retrying:"
              - "  1. SSM agent bootstrap: connect via EC2 Instance Connect and check"
              - "       sudo systemctl status amazon-ssm-agent"
              - "       sudo cat /var/log/cloud-init-output.log | tail -30"
              - "  2. IAM instance profile: verify AmazonSSMManagedInstanceCore is attached to"
              - "       {{ ec2_launch_iam_profile }}"
              - "  3. Outbound connectivity: the instance must reach port 443 on"
              - "       ssm.{{ aws_region }}.amazonaws.com (check the security group and route table)."
              - "  4. Confirm the instance is actually running:"
              - "       aws ec2 describe-instances --instance-ids {{ provisioned_instance_id }} --region {{ aws_region }} --query 'Reservations[].Instances[].State'"
          tags:
            - aws
            - ec2

    # =========================================================================
    # 3. Maintenance window
    # =========================================================================

    - name: Create AWS maintenance window for scheduled SSM tasks
      ansible.builtin.command:
        cmd: >-
          aws ssm create-maintenance-window
          --name {{ demo_aws_maintenance_window_name }}
          --schedule "{{ demo_aws_maintenance_window_schedule }}"
          --duration 2
          --cutoff 1
          --allow-unassociated-targets
          --region {{ aws_region }}
          --output json
      register: mw_create
      changed_when: true
      # IdempotentParameterMismatch means a window with this name already exists.
      failed_when:
        - mw_create.rc != 0
        - "'IdempotentParameterMismatch' not in mw_create.stderr"
        - "'already exists' not in mw_create.stderr"
      tags:
        - aws
        - maintenance-window

    - name: Store maintenance window ID
      ansible.builtin.set_fact:
        provisioned_window_id: >-
          {{ (mw_create.stdout | from_json).WindowId
          if mw_create.rc == 0
          else 'already-exists-check-aws-console' }}
      tags:
        - aws
        - maintenance-window

    # =========================================================================
    # 4. Output — operator must update demo_variables.yml with these values
    # =========================================================================

    - name: Save setup outputs for workflow chaining
      ansible.builtin.set_stats:
        data:
          aws_ec2_instance_id: "{{ provisioned_instance_id }}"
          aws_maintenance_window_id: "{{ provisioned_window_id }}"
          aws_account_id: "{{ resolved_aws_account_id }}"
          aws_ssm_service_role_arn: "{{ resolved_ssm_service_role_arn }}"
      tags:
        - aws
        - setup

    - name: Report required manual steps after setup
      ansible.builtin.debug:
        msg:
          - "EC2 instance ID      : {{ provisioned_instance_id }}"
          - "Maintenance window ID: {{ provisioned_window_id }}"
          - "AWS account ID       : {{ resolved_aws_account_id }}"
          - "SSM service role ARN : {{ resolved_ssm_service_role_arn }}"
          - "ACTION REQUIRED: copy the four values above into demo_variables.yml"
          - "  aws_ssm_target_instance_id, aws_ssm_maintenance_window_id,"
          - "  aws_account_id, aws_ssm_service_role_arn — then re-run aap_config.yml."
      tags:
        - aws
        - setup
