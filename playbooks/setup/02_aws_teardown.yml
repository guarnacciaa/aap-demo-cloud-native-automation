# Description: Remove AWS resources created by 02_aws_setup.yml.
# Terminates the EC2 instance, deletes the SSM Automation document, and
# deletes the maintenance window. Requires demo_cleanup_confirm=true.
# Run after aap_cleanup.yml has removed the Controller objects.
#
# When aws_create_network_resources: true, also removes the IAM role, instance
# profile, security group, subnets, route tables, internet gateway, and VPC
# that were provisioned by 02_aws_setup.yml. When false, only the EC2 instance,
# SSM document, and maintenance window are removed (the pre-existing network
# and IAM objects are left untouched).
---
- name: Remove AWS supporting resources for cloud-native automation demo
  hosts: localhost
  gather_facts: false
  collections:
    - amazon.aws
    - ansible.builtin
  vars_files:
    - ../../vault.yml
    - ../../group_vars/all/demo_variables.yml

  environment:
    # AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY are injected automatically by
    # the AAP Amazon Web Services credential; do not redeclare them here or the
    # play fails when aws_access_key is undefined in the AAP execution context.
    # For local runs, configure ~/.aws/credentials or export the variables before
    # invoking ansible-playbook.
    AWS_DEFAULT_REGION: "{{ aws_region }}"

  pre_tasks:
    - name: Require demo_cleanup_confirm=true before removing AWS resources
      ansible.builtin.assert:
        that:
          - demo_cleanup_confirm | default(false) | bool
        fail_msg: Pass -e demo_cleanup_confirm=true to run AWS teardown.
      tags:
        - always

  tasks:
    # =========================================================================
    # 1. Maintenance window
    # =========================================================================

    - name: Look up maintenance window by name
      # Look up by name rather than ID so teardown stays correct even when the
      # setup was re-run (creating a new window with a new ID) without updating
      # aws_ssm_maintenance_window_id in demo_variables.yml.
      ansible.builtin.command:
        cmd: >-
          aws ssm describe-maintenance-windows
          --filters Key=Name,Values={{ demo_aws_maintenance_window_name }}
          --region {{ aws_region }}
          --output json
      register: mw_lookup
      changed_when: false
      tags:
        - aws
        - maintenance-window

    - name: Delete all maintenance windows matching the demo name
      # Iterates over every window returned by the lookup — handles the case
      # where multiple runs left behind more than one window with the same name.
      # DoesNotExistException is accepted in case of a race condition.
      ansible.builtin.command:
        cmd: >-
          aws ssm delete-maintenance-window
          --window-id {{ item.WindowId }}
          --region {{ aws_region }}
          --output json
      loop: "{{ (mw_lookup.stdout | from_json).WindowIdentities | default([]) }}"
      loop_control:
        label: "{{ item.WindowId }}"
      register: mw_delete
      changed_when: mw_delete.rc == 0
      failed_when:
        - mw_delete.rc != 0
        - "'DoesNotExistException' not in mw_delete.stderr"
      tags:
        - aws
        - maintenance-window

    # =========================================================================
    # 2. EC2 instance
    # =========================================================================

    - name: Terminate EC2 instance by name tag
      # Terminate by name tag so the playbook does not require the instance ID
      # to be current after manual changes to demo_variables.yml.
      amazon.aws.ec2_instance:
        filters:
          "tag:Name": "{{ aws_ec2_instance_name }}"
          "tag:demo": cloud-native-automation
        state: terminated
        wait: true
      tags:
        - aws
        - ec2

    # =========================================================================
    # 3. SSM Automation document
    # =========================================================================

    - name: Delete SSM Automation document
      ansible.builtin.command:
        cmd: >-
          aws ssm delete-document
          --name {{ aws_ssm_document_name }}
          --region {{ aws_region }}
          --output json
      register: ssm_doc_delete
      changed_when: ssm_doc_delete.rc == 0
      failed_when:
        - ssm_doc_delete.rc != 0
        - "'InvalidDocument' not in ssm_doc_delete.stderr"
      tags:
        - aws
        - ssm

    # =========================================================================
    # 4. Conditional: remove network and IAM resources created from scratch
    #    Skipped entirely when aws_create_network_resources is false.
    # =========================================================================

    - name: Delete IAM instance profile created by 02_aws_setup.yml
      # The instance profile must be removed before the role can be deleted;
      # IAM rejects role deletion while a profile still references it.
      # Uses amazon.aws.iam_instance_profile, which supersedes the deprecated
      # delete_instance_profile option on amazon.aws.iam_role.
      amazon.aws.iam_instance_profile:
        name: "{{ aws_iam_role_name }}"
        state: absent
      when: aws_create_network_resources | default(false) | bool
      tags:
        - aws
        - iam

    - name: Delete IAM EC2 role created by 02_aws_setup.yml
      # Instance profile removed in the previous task; role deletion is now safe.
      amazon.aws.iam_role:
        name: "{{ aws_iam_role_name }}"
        state: absent
      when: aws_create_network_resources | default(false) | bool
      tags:
        - aws
        - iam

    - name: Delete IAM service role for SSM maintenance window task execution
      # This is the ssm.amazonaws.com trust role created alongside the EC2 instance
      # profile. It has no instance profile attached, so no profile deletion is needed.
      amazon.aws.iam_role:
        name: "{{ aws_ssm_service_role_name }}"
        state: absent
      when: aws_create_network_resources | default(false) | bool
      tags:
        - aws
        - iam

    # Look up the VPC by name and demo tag so downstream resource deletions have
    # the VPC ID even if it was never stored in a variable.
    - name: Look up demo VPC by name tag
      amazon.aws.ec2_vpc_net_info:
        region: "{{ aws_region }}"
        filters:
          "tag:Name": "{{ aws_vpc_name }}"
          "tag:demo": cloud-native-automation
      register: aws_vpc_lookup
      when: aws_create_network_resources | default(false) | bool
      tags:
        - aws
        - network

    - name: Set VPC ID fact for teardown (skip if VPC not found)
      # If the VPC was already deleted or never created, set an empty string so
      # all subsequent network tasks are skipped via their `when` condition.
      ansible.builtin.set_fact:
        teardown_vpc_id: "{{ aws_vpc_lookup.vpcs[0].id | default('') }}"
      when: aws_create_network_resources | default(false) | bool
      tags:
        - aws
        - network

    - name: Delete security group from the demo VPC
      amazon.aws.ec2_security_group:
        name: "{{ aws_sg_name }}"
        region: "{{ aws_region }}"
        vpc_id: "{{ teardown_vpc_id }}"
        state: absent
      when:
        - aws_create_network_resources | default(false) | bool
        - teardown_vpc_id | default('') | length > 0
      tags:
        - aws
        - network

    - name: Look up demo subnets in the VPC
      amazon.aws.ec2_vpc_subnet_info:
        region: "{{ aws_region }}"
        filters:
          vpc-id: "{{ teardown_vpc_id }}"
          "tag:demo": cloud-native-automation
      register: aws_subnet_lookup
      when:
        - aws_create_network_resources | default(false) | bool
        - teardown_vpc_id | default('') | length > 0
      tags:
        - aws
        - network

    - name: Delete demo subnets
      amazon.aws.ec2_vpc_subnet:
        region: "{{ aws_region }}"
        vpc_id: "{{ teardown_vpc_id }}"
        cidr: "{{ item.cidr_block }}"
        state: absent
      loop: "{{ aws_subnet_lookup.subnets | default([]) }}"
      when:
        - aws_create_network_resources | default(false) | bool
        - teardown_vpc_id | default('') | length > 0
      tags:
        - aws
        - network

    - name: Look up route tables associated with the demo VPC
      amazon.aws.ec2_vpc_route_table_info:
        region: "{{ aws_region }}"
        filters:
          vpc-id: "{{ teardown_vpc_id }}"
          "tag:demo": cloud-native-automation
      register: aws_rt_lookup
      when:
        - aws_create_network_resources | default(false) | bool
        - teardown_vpc_id | default('') | length > 0
      tags:
        - aws
        - network

    - name: Delete custom route tables from the demo VPC
      # Only delete custom route tables; the VPC main route table is removed
      # automatically when the VPC itself is deleted.
      amazon.aws.ec2_vpc_route_table:
        region: "{{ aws_region }}"
        vpc_id: "{{ teardown_vpc_id }}"
        route_table_id: "{{ item.id }}"
        lookup: id
        state: absent
      loop: "{{ aws_rt_lookup.route_tables | default([]) }}"
      when:
        - aws_create_network_resources | default(false) | bool
        - teardown_vpc_id | default('') | length > 0
        - not (item.associations | default([]) | selectattr('main', 'defined') | selectattr('main') | list | length > 0)
      tags:
        - aws
        - network

    - name: Delete internet gateway from the demo VPC
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ teardown_vpc_id }}"
        region: "{{ aws_region }}"
        state: absent
      when:
        - aws_create_network_resources | default(false) | bool
        - teardown_vpc_id | default('') | length > 0
      tags:
        - aws
        - network

    - name: Delete the demo VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ aws_vpc_name }}"
        cidr_block: "{{ aws_vpc_cidr }}"
        region: "{{ aws_region }}"
        state: absent
      when:
        - aws_create_network_resources | default(false) | bool
        - teardown_vpc_id | default('') | length > 0
      tags:
        - aws
        - network

    - name: Report AWS teardown completion
      ansible.builtin.debug:
        msg: >-
          EC2 instance '{{ aws_ec2_instance_name }}', SSM document
          '{{ aws_ssm_document_name }}', and maintenance window(s) named
          '{{ demo_aws_maintenance_window_name }}' removal requested (404 means already absent).
          {% if aws_create_network_resources | default(false) | bool %}
          {% if teardown_vpc_id | default('') | length > 0 %}
          VPC '{{ aws_vpc_name }}', subnet, security group, internet gateway, route tables,
          EC2 IAM role/profile '{{ aws_iam_role_name }}', and SSM service role
          '{{ aws_ssm_service_role_name }}' also removed.
          {% else %}
          VPC '{{ aws_vpc_name }}' was not found (already removed or never created);
          EC2 IAM role/profile and SSM service role deletion was attempted.
          {% endif %}
          {% else %}
          Pre-existing network and IAM resources were not modified (bring-your-own mode).
          {% endif %}
      tags:
        - aws
        - teardown
