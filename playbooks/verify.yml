# Description: Smoke-test prerequisites for cloud-native automation demo.
---
- name: Verify cloud native automation demo prerequisites
  hosts: localhost
  gather_facts: false
  collections:
    - ansible.builtin

  tasks:
    - name: Confirm required variables are defined
      ansible.builtin.assert:
        that:
          - azure_automation_account is defined
          - azure_runbook_name is defined
          - aws_ssm_document_name is defined
        fail_msg: Copy demo_variables.yml.example to demo_variables.yml and set values.
      tags:
        - verify

    - name: Confirm awscli is available on the control node
      # awscli is required by setup playbooks for SSM document creation, maintenance
      # window registration, and SSM agent polling — no certified module covers these.
      # Install with: pip3 install awscli
      ansible.builtin.command:
        cmd: aws --version
      changed_when: false
      register: awscli_check
      tags:
        - verify

    - name: Confirm boto3 is available on the control node
      # boto3 is required by amazon.aws collection modules (ec2_instance, iam_role, etc.).
      # Install with: pip3 install boto3
      ansible.builtin.command:
        cmd: python3 -c "import boto3; print(boto3.__version__)"
      changed_when: false
      register: boto3_check
      tags:
        - verify

    - name: Report control node dependency status
      ansible.builtin.debug:
        msg:
          - "awscli : {{ awscli_check.stdout | default('NOT FOUND') }}"
          - "boto3  : {{ boto3_check.stdout | default('NOT FOUND') }}"
      tags:
        - verify
