# Description: Smoke-test prerequisites for cloud-native automation demo.
---
- name: Verify cloud native automation demo prerequisites
  hosts: localhost
  gather_facts: false
  collections:
    - ansible.builtin

  tasks:
    - name: Confirm required variables are defined
      ansible.builtin.assert:
        that:
          - azure_automation_account is defined
          - azure_runbook_name is defined
          - aws_ssm_document_name is defined
        fail_msg: Copy demo_variables.yml.example to demo_variables.yml and set values.
      tags:
        - verify

    # azure_auth_mode is orthogonal to demo_manage_infrastructure: it applies
    # to every Azure-facing playbook in every mode (see demo_variables.yml.example).
    - name: Confirm azure_auth_mode is a supported value
      ansible.builtin.assert:
        that:
          - azure_auth_mode | default('service_principal') in ['service_principal', 'msi']
        fail_msg: >-
          azure_auth_mode must be "service_principal" or "msi" in demo_variables.yml.
      tags:
        - verify

    # Only required when azure_auth_mode is the default (service_principal);
    # unused and therefore never checked with Managed Identity (azure_auth_mode: msi).
    - name: Confirm Azure Service Principal secrets when azure_auth_mode is service_principal
      ansible.builtin.assert:
        that:
          - azure_client_id is defined
          - azure_client_id != "CHANGE_ME"
          - azure_client_secret is defined
          - azure_client_secret != "CHANGE_ME"
        fail_msg: >-
          Set vault_azure_client_id and vault_azure_client_secret in vault.yml,
          or set azure_auth_mode: msi in demo_variables.yml if AAP's execution
          nodes run on Azure with a Managed Identity attached.
      when: azure_auth_mode | default('service_principal') == 'service_principal'
      tags:
        - verify

    # Only required in lab/dev mode (demo_manage_infrastructure: true); these
    # variables are exclusively consumed by Setup - */Teardown - * (see the
    # [LAB/DEV ONLY] sections in demo_variables.yml.example) and are never
    # read in customer/PoC mode, so this check is skipped when the flag is false.
    - name: Confirm Azure/AWS provisioning variables (lab/dev mode only)
      ansible.builtin.assert:
        that:
          - aws_ec2_ami_id is defined
          - aws_ec2_ami_id != "CHANGE_ME"
          - azure_resource_group_location is defined
          - azure_automation_account_sku is defined
        fail_msg: >-
          Azure/AWS provisioning variables are incomplete. Check
          demo_variables.yml, or set demo_manage_infrastructure: false if you
          are deploying against pre-existing customer infrastructure.
      when: demo_manage_infrastructure | default(true) | bool
      tags:
        - verify

    - name: Confirm awscli is available on the control node
      # awscli is required by setup playbooks for SSM document creation, maintenance
      # window registration, and SSM agent polling — no certified module covers these.
      # Install with: pip3 install awscli
      ansible.builtin.command:
        cmd: aws --version
      changed_when: false
      register: awscli_check
      tags:
        - verify

    - name: Confirm boto3 is available on the control node
      # boto3 is required by amazon.aws collection modules (ec2_instance, iam_role, etc.).
      # Install with: pip3 install boto3
      ansible.builtin.command:
        cmd: python3 -c "import boto3; print(boto3.__version__)"
      changed_when: false
      register: boto3_check
      tags:
        - verify

    - name: Report control node dependency status
      ansible.builtin.debug:
        msg:
          - "awscli : {{ awscli_check.stdout | default('NOT FOUND') }}"
          - "boto3  : {{ boto3_check.stdout | default('NOT FOUND') }}"
      tags:
        - verify

    - name: Report verification status
      ansible.builtin.debug:
        msg: >-
          Prerequisite checks passed.
          {{ 'Run WF - Demo setup to provision the Azure Automation Account and AWS SSM resources, then launch the Azure/AWS scenario workflows.'
             if (demo_manage_infrastructure | default(true) | bool)
             else 'demo_manage_infrastructure is false: launch the Azure/AWS scenario workflows directly against the existing Automation Account and SSM target.' }}
      tags:
        - verify
