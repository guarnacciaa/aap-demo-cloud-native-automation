# Description: Apply AAP Configuration as Code for the cloud-native-automation demo.
# Run from the artifact root after copying demo_variables.yml.example and vault.yml.
# Safe to re-run; infra.aap_configuration dispatch reconciles desired state.
---
- name: Apply cloud native automation demo configuration to AAP
  hosts: localhost
  gather_facts: false
  collections:
    - infra.aap_configuration
    - ansible.builtin
  vars_files:
    - ../vault.yml
    - ../group_vars/all/demo_variables.yml

  pre_tasks:
    # Core prerequisites — always checked regardless of provider mode.
    # aws_ssm_target_instance_id, aws_ssm_maintenance_window_id, aws_account_id,
    # and aws_ssm_service_role_arn are printed by 02_aws_setup.yml and must be
    # copied into demo_variables.yml before this playbook runs.
    - name: Validate core required variables
      ansible.builtin.assert:
        that:
          - aap_hostname is defined
          - aap_hostname != "CHANGE_ME"
          - demo_project_scm_url is defined
          - demo_project_scm_url != "CHANGE_ME_GIT_REPO_URL"
          - aws_ssm_target_instance_id is defined
          - aws_ssm_target_instance_id != "CHANGE_ME"
          - aws_ssm_maintenance_window_id is defined
          - aws_ssm_maintenance_window_id != "CHANGE_ME"
          - aws_account_id is defined
          - aws_account_id != "CHANGE_ME"
          - aws_ssm_service_role_arn is defined
          - aws_ssm_service_role_arn != "CHANGE_ME_ROLE_ARN"
        fail_msg: >-
          One or more required variables are still set to CHANGE_ME in demo_variables.yml.
          Run 02_aws_setup.yml first, then copy all four printed values into demo_variables.yml:
            aws_ssm_target_instance_id, aws_ssm_maintenance_window_id,
            aws_account_id, aws_ssm_service_role_arn.
      tags:
        - always

    # Azure bring-your-own mode: resource group and account must already exist.
    # Skipped when azure_create_automation_account is true — 01_azure_setup.yml
    # provisions both objects before this playbook runs.
    - name: Validate Azure bring-your-own resource names
      ansible.builtin.assert:
        that:
          - azure_automation_resource_group is defined
          - azure_automation_resource_group != "CHANGE_ME"
          - azure_automation_account is defined
          - azure_automation_account != "CHANGE_ME"
        fail_msg: >-
          azure_create_automation_account is false (bring-your-own mode). Set
          azure_automation_resource_group and azure_automation_account in
          demo_variables.yml to the names of pre-existing Azure resources, or set
          azure_create_automation_account: true and run 01_azure_setup.yml to
          provision the resource group and Automation Account from scratch.
      when: not (azure_create_automation_account | default(false) | bool)
      tags:
        - always

    # Azure create-from-scratch mode: names must be set before provisioning.
    # 01_azure_setup.yml creates the resource group and Automation Account
    # using these names — they cannot be CHANGE_ME.
    - name: Validate Azure create-from-scratch resource names
      ansible.builtin.assert:
        that:
          - azure_automation_resource_group is defined
          - azure_automation_resource_group != "CHANGE_ME"
          - azure_automation_account is defined
          - azure_automation_account != "CHANGE_ME"
        fail_msg: >-
          azure_create_automation_account is true (create-from-scratch mode). Set
          azure_automation_resource_group and azure_automation_account in
          demo_variables.yml to the desired names for the resources that
          01_azure_setup.yml will create, then run 01_azure_setup.yml before
          this playbook.
      when: azure_create_automation_account | default(false) | bool
      tags:
        - always

    - name: Validate azure_auth_mode is a supported value
      ansible.builtin.assert:
        that:
          - azure_auth_mode | default('service_principal') in ['service_principal', 'msi']
        fail_msg: >-
          azure_auth_mode must be "service_principal" or "msi". See
          demo_variables.yml.example for what each mode requires.
      tags:
        - always

    # Only enforced when azure_auth_mode is the default (service_principal):
    # the client_id/secret vault entries are unused with Managed Identity, so
    # a msi deployment must not be blocked by leaving them at CHANGE_ME.
    - name: Validate Azure Service Principal secrets when azure_auth_mode is service_principal
      ansible.builtin.assert:
        that:
          - azure_client_id is defined
          - azure_client_id != "CHANGE_ME"
          - azure_client_secret is defined
          - azure_client_secret != "CHANGE_ME"
        fail_msg: >-
          azure_auth_mode is "service_principal" (the default): set
          vault_azure_client_id and vault_azure_client_secret in vault.yml.
          If AAP's execution nodes run on Azure with a Managed Identity
          attached, set azure_auth_mode: msi instead and skip these secrets.
      when: azure_auth_mode | default('service_principal') == 'service_principal'
      tags:
        - always

    # Only enforced in lab/dev mode: these variables are exclusively consumed
    # by Setup - */Teardown - * (see the [LAB/DEV ONLY] sections in
    # demo_variables.yml.example) and are never read when
    # demo_manage_infrastructure is false, so a customer/PoC deployment is
    # never blocked by leaving them at their example defaults.
    - name: Validate lab/dev infrastructure provisioning variables
      ansible.builtin.assert:
        that:
          - aws_ec2_ami_id is defined
          - aws_ec2_ami_id != "CHANGE_ME"
          - azure_resource_group_location is defined
          - azure_automation_account_sku is defined
        fail_msg: >-
          demo_manage_infrastructure is true (lab/dev mode): set the Azure/AWS
          provisioning variables in demo_variables.yml (see the [LAB/DEV ONLY]
          sections in demo_variables.yml.example), for example aws_ec2_ami_id.
          If you are deploying against a customer's pre-existing
          infrastructure, set demo_manage_infrastructure: false instead.
      when: demo_manage_infrastructure | default(true) | bool
      tags:
        - always

    # demo_manage_infrastructure=true (lab/dev): merge in the provisioning and
    # teardown job/workflow templates from job_templates_infra.yml and
    # workflow_templates_infra.yml. When false (customer/PoC deployment on
    # pre-existing infrastructure), controller_templates and
    # controller_workflows keep only the scenario-related objects defined in
    # job_templates.yml / workflow_templates.yml, so AAP never gets objects
    # capable of creating or destroying the Azure Automation Account or the
    # AWS networking/IAM/EC2 target.
    - name: Merge infrastructure lifecycle job and workflow templates in lab/dev mode
      ansible.builtin.set_fact:
        controller_templates: "{{ controller_templates + controller_templates_infra }}"
        controller_workflows: "{{ controller_workflows + controller_workflows_infra }}"
      when: demo_manage_infrastructure | default(true) | bool
      tags:
        - always

  roles:
    # NOTE: infra.aap_configuration is validated content (not certified).
    - role: infra.aap_configuration.dispatch
      tags:
        - all
        - organizations
        - credentials
        - execution_environments
        - inventories
        - projects
        - labels
        - job_templates
        - workflow_job_templates
