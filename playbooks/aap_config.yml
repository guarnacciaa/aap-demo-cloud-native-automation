# Description: Apply AAP Configuration as Code for the cloud-native-automation demo.
# Run from the artifact root after copying demo_variables.yml.example and vault.yml.
# Safe to re-run; infra.aap_configuration dispatch reconciles desired state.
---
- name: Apply cloud native automation demo configuration to AAP
  hosts: localhost
  gather_facts: false
  collections:
    - infra.aap_configuration
    - ansible.builtin
  vars_files:
    - ../vault.yml
    - ../group_vars/all/demo_variables.yml

  pre_tasks:
    # Core prerequisites — always checked regardless of provider mode.
    # aws_ssm_target_instance_id, aws_ssm_maintenance_window_id, aws_account_id,
    # and aws_ssm_service_role_arn are printed by 02_aws_setup.yml and must be
    # copied into demo_variables.yml before this playbook runs.
    - name: Validate core required variables
      ansible.builtin.assert:
        that:
          - aap_hostname is defined
          - aap_hostname != "CHANGE_ME"
          - demo_project_scm_url is defined
          - demo_project_scm_url != "CHANGE_ME_GIT_REPO_URL"
          - aws_ssm_target_instance_id is defined
          - aws_ssm_target_instance_id != "CHANGE_ME"
          - aws_ssm_maintenance_window_id is defined
          - aws_ssm_maintenance_window_id != "CHANGE_ME"
          - aws_account_id is defined
          - aws_account_id != "CHANGE_ME"
          - aws_ssm_service_role_arn is defined
          - aws_ssm_service_role_arn != "CHANGE_ME_ROLE_ARN"
        fail_msg: >-
          One or more required variables are still set to CHANGE_ME in demo_variables.yml.
          Run 02_aws_setup.yml first, then copy all four printed values into demo_variables.yml:
            aws_ssm_target_instance_id, aws_ssm_maintenance_window_id,
            aws_account_id, aws_ssm_service_role_arn.

    # Azure bring-your-own mode: resource group and account must already exist.
    # Skipped when azure_create_automation_account is true — 01_azure_setup.yml
    # provisions both objects before this playbook runs.
    - name: Validate Azure bring-your-own resource names
      ansible.builtin.assert:
        that:
          - azure_automation_resource_group is defined
          - azure_automation_resource_group != "CHANGE_ME"
          - azure_automation_account is defined
          - azure_automation_account != "CHANGE_ME"
        fail_msg: >-
          azure_create_automation_account is false (bring-your-own mode). Set
          azure_automation_resource_group and azure_automation_account in
          demo_variables.yml to the names of pre-existing Azure resources, or set
          azure_create_automation_account: true and run 01_azure_setup.yml to
          provision the resource group and Automation Account from scratch.
      when: not (azure_create_automation_account | default(false) | bool)

    # Azure create-from-scratch mode: names must be set before provisioning.
    # 01_azure_setup.yml creates the resource group and Automation Account
    # using these names — they cannot be CHANGE_ME.
    - name: Validate Azure create-from-scratch resource names
      ansible.builtin.assert:
        that:
          - azure_automation_resource_group is defined
          - azure_automation_resource_group != "CHANGE_ME"
          - azure_automation_account is defined
          - azure_automation_account != "CHANGE_ME"
        fail_msg: >-
          azure_create_automation_account is true (create-from-scratch mode). Set
          azure_automation_resource_group and azure_automation_account in
          demo_variables.yml to the desired names for the resources that
          01_azure_setup.yml will create, then run 01_azure_setup.yml before
          this playbook.
      when: azure_create_automation_account | default(false) | bool

  roles:
    # NOTE: infra.aap_configuration is validated content (not certified).
    - role: infra.aap_configuration.dispatch
      tags:
        - all
        - organizations
        - credentials
        - execution_environments
        - inventories
        - projects
        - labels
        - job_templates
        - workflow_job_templates
