# Description: Start an Azure Automation runbook job via ARM REST API and collect output.
# azure.azcollection has no runbook execution module; uri is used intentionally.
---
- name: Execute Azure Automation runbook and collect job output
  hosts: localhost
  gather_facts: true
  collections:
    - ansible.builtin

  vars:
    azure_automation_resource_group: "{{ azure_automation_resource_group | mandatory }}"
    azure_automation_account: "{{ azure_automation_account | mandatory }}"
    azure_runbook_name: "{{ azure_runbook_name | mandatory }}"
    azure_arm_api_version: "2024-10-23"
    azure_job_name: "aap-{{ azure_runbook_name }}-{{ ansible_date_time.epoch }}"
    # Two mutually exclusive ways to pass runbook parameters (Azure's Job API
    # always requires a name-keyed dictionary, never a positional array):
    #   azure_runbook_parameters: explicit {Name: Value} dict — use when the
    #     exact parameter names are known.
    #   azure_runbook_parameter_values: ordered list of values only — use when
    #     the customer supplied values without names; resolved to real names
    #     below via the runbook's own declared parameter position.
    azure_runbook_parameters: "{{ azure_runbook_parameters | default({}) }}"
    azure_runbook_parameter_values: "{{ azure_runbook_parameter_values | default([]) }}"

  pre_tasks:
    - name: Resolve Azure credentials from AAP credential injection or Ansible variables
      # The AAP Azure Service Principal credential injects AZURE_SUBSCRIPTION_ID,
      # AZURE_CLIENT_ID, AZURE_SECRET, and AZURE_TENANT as environment variables.
      # When running locally with demo_variables.yml those Ansible variables are
      # already defined at higher precedence and take priority over the env lookup.
      # Self-referencing in vars: causes infinite recursion in Ansible — set_fact
      # in pre_tasks avoids that by resolving variables at task execution time.
      ansible.builtin.set_fact:
        azure_subscription_id: >-
          {{ azure_subscription_id
             if (azure_subscription_id | default('')) | length > 0
             else lookup('env', 'AZURE_SUBSCRIPTION_ID') }}
        azure_tenant_id: >-
          {{ azure_tenant_id
             if (azure_tenant_id | default('')) | length > 0
             else lookup('env', 'AZURE_TENANT') }}
        azure_client_id: >-
          {{ azure_client_id
             if (azure_client_id | default('')) | length > 0
             else lookup('env', 'AZURE_CLIENT_ID') }}
        azure_client_secret: >-
          {{ azure_client_secret
             if (azure_client_secret | default('')) | length > 0
             else lookup('env', 'AZURE_SECRET') }}
      no_log: "{{ demo_no_log | default(false) }}"
      tags:
        - always

  tasks:
    - name: Obtain Azure AD access token via Service Principal (client credentials)
      ansible.builtin.uri:
        url: "https://login.microsoftonline.com/{{ azure_tenant_id }}/oauth2/v2.0/token"
        method: POST
        body_format: form-urlencoded
        body:
          grant_type: client_credentials
          client_id: "{{ azure_client_id }}"
          client_secret: "{{ azure_client_secret }}"
          scope: https://management.azure.com/.default
        status_code: 200
      register: azure_token_sp
      when: azure_auth_mode | default('service_principal') == 'service_principal'
      no_log: "{{ demo_no_log | default(false) }}"
      tags:
        - azure
        - auth

    - name: Obtain Azure AD access token via Managed Identity (IMDS)
      # Only works when this task executes on an Azure resource (VM/VMSS/AKS node/
      # AAP execution node) with a system- or user-assigned identity enabled.
      ansible.builtin.uri:
        url: "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://management.azure.com/"
        method: GET
        headers:
          Metadata: "true"
        status_code: 200
      register: azure_token_msi
      when: azure_auth_mode | default('service_principal') == 'msi'
      tags:
        - azure
        - auth

    - name: Normalize Azure access token regardless of auth mode
      ansible.builtin.set_fact:
        azure_access_token: >-
          {{ (azure_token_sp.json.access_token) if (azure_auth_mode | default('service_principal') == 'service_principal') else (azure_token_msi.json.access_token) }}
      no_log: "{{ demo_no_log | default(false) }}"
      tags:
        - azure
        - auth

    # Azure Automation's Job API always requires parameters as a name-keyed
    # dictionary — see the note on azure_runbook_parameter_values above. When
    # only positional values were supplied, resolve the runbook's own
    # definition (which exposes each parameter's zero-based `position`) to
    # recover the real names and build the dictionary the API expects.
    - name: Retrieve runbook definition to resolve positional parameter names
      ansible.builtin.uri:
        url: >-
          https://management.azure.com/subscriptions/{{ azure_subscription_id }}/resourceGroups/{{ azure_automation_resource_group }}/providers/Microsoft.Automation/automationAccounts/{{ azure_automation_account }}/runbooks/{{ azure_runbook_name }}?api-version={{ azure_arm_api_version }}
        method: GET
        headers:
          Authorization: "Bearer {{ azure_access_token }}"
        status_code: 200
      register: azure_runbook_definition
      when: azure_runbook_parameter_values | length > 0
      tags:
        - azure
        - run

    - name: Extract parameter names ordered by their declared position
      ansible.builtin.set_fact:
        azure_runbook_parameter_names: >-
          {{
            azure_runbook_definition.json.properties.parameters
            | default({})
            | dict2items
            | sort(attribute='value.position')
            | map(attribute='key')
            | list
          }}
      when: azure_runbook_parameter_values | length > 0
      tags:
        - azure
        - run

    # A silent length mismatch would otherwise zip() values to the wrong
    # names (or silently drop extras) instead of failing loudly before the
    # job is started against the customer's Automation Account.
    - name: Validate positional value count matches the runbook's declared parameters
      ansible.builtin.assert:
        that:
          - azure_runbook_parameter_values | length == azure_runbook_parameter_names | length
        fail_msg: >-
          azure_runbook_parameter_values supplies {{ azure_runbook_parameter_values | length }}
          value(s), but runbook {{ azure_runbook_name }} declares
          {{ azure_runbook_parameter_names | length }} parameter(s):
          {{ azure_runbook_parameter_names | join(', ') }}. Fix the list order/count,
          or use azure_runbook_parameters with explicit names instead.
      when: azure_runbook_parameter_values | length > 0
      tags:
        - azure
        - run

    - name: Build the named parameters dictionary from positional values
      ansible.builtin.set_fact:
        azure_runbook_parameters: "{{ dict(azure_runbook_parameter_names | zip(azure_runbook_parameter_values)) }}"
      when: azure_runbook_parameter_values | length > 0
      no_log: "{{ demo_no_log | default(false) }}"
      tags:
        - azure
        - run

    # Runbook parameter values (e.g. email addresses, environment identifiers)
    # can carry customer-sensitive data, so this task respects demo_no_log the
    # same way the credential-handling tasks above do.
    - name: Start Azure Automation runbook job
      ansible.builtin.uri:
        url: >-
          https://management.azure.com/subscriptions/{{ azure_subscription_id }}/resourceGroups/{{ azure_automation_resource_group }}/providers/Microsoft.Automation/automationAccounts/{{ azure_automation_account }}/jobs/{{ azure_job_name }}?api-version={{ azure_arm_api_version }}
        method: PUT
        headers:
          Authorization: "Bearer {{ azure_access_token }}"
          Content-Type: application/json
        body_format: json
        body:
          properties:
            runbook:
              name: "{{ azure_runbook_name }}"
            parameters: "{{ azure_runbook_parameters | default({}) }}"
        status_code:
          - 200
          - 201
      register: azure_job_create
      no_log: "{{ demo_no_log | default(false) }}"
      tags:
        - azure
        - run

    - name: Poll Azure Automation job until completion
      ansible.builtin.uri:
        url: >-
          https://management.azure.com/subscriptions/{{ azure_subscription_id }}/resourceGroups/{{ azure_automation_resource_group }}/providers/Microsoft.Automation/automationAccounts/{{ azure_automation_account }}/jobs/{{ azure_job_name }}?api-version={{ azure_arm_api_version }}
        method: GET
        headers:
          Authorization: "Bearer {{ azure_access_token }}"
        status_code: 200
      register: azure_job_status
      until: azure_job_status.json.properties.status in ['Completed', 'Failed', 'Suspended', 'Stopped']
      retries: 60
      delay: 15
      tags:
        - azure
        - run

    # The job status alone does not explain WHY a runbook failed — the actual
    # PowerShell exception only lives in the job's Error stream. Fetching it
    # here, before the assert, means the failure reason is visible directly in
    # the AAP job output instead of requiring a trip to the Azure portal.
    - name: List Azure Automation job streams for diagnostics
      ansible.builtin.uri:
        url: >-
          https://management.azure.com/subscriptions/{{ azure_subscription_id }}/resourceGroups/{{ azure_automation_resource_group }}/providers/Microsoft.Automation/automationAccounts/{{ azure_automation_account }}/jobs/{{ azure_job_name }}/streams?api-version={{ azure_arm_api_version }}
        method: GET
        headers:
          Authorization: "Bearer {{ azure_access_token }}"
        status_code: 200
      register: azure_job_streams
      changed_when: false
      tags:
        - azure
        - diagnostics

    - name: Identify error stream IDs when the job did not complete cleanly
      ansible.builtin.set_fact:
        azure_error_stream_ids: >-
          {{
            azure_job_streams.json.value
            | selectattr('properties.streamType', 'equalto', 'Error')
            | map(attribute='properties.jobStreamId')
            | list
          }}
      tags:
        - azure
        - diagnostics

    # The streams list endpoint only returns metadata (stream type, timestamp);
    # the actual exception text requires a Get call per stream ID.
    - name: Fetch the text of each error stream
      ansible.builtin.uri:
        url: >-
          https://management.azure.com/subscriptions/{{ azure_subscription_id }}/resourceGroups/{{ azure_automation_resource_group }}/providers/Microsoft.Automation/automationAccounts/{{ azure_automation_account }}/jobs/{{ azure_job_name }}/streams/{{ item }}?api-version={{ azure_arm_api_version }}
        method: GET
        headers:
          Authorization: "Bearer {{ azure_access_token }}"
        status_code: 200
      register: azure_error_stream_details
      loop: "{{ azure_error_stream_ids }}"
      changed_when: false
      when: azure_error_stream_ids | length > 0
      tags:
        - azure
        - diagnostics

    - name: Combine error stream text into a single diagnostic string
      ansible.builtin.set_fact:
        azure_error_stream_text: >-
          {{
            azure_error_stream_details.results
            | default([])
            | selectattr('json', 'defined')
            | map(attribute='json.properties.streamText')
            | list
            | join('\n')
          }}
      tags:
        - azure
        - diagnostics

    # Published before the assert (which is fatal on failure) so a failed run
    # still leaves the error text available to workflow/email nodes downstream.
    - name: Publish Azure runbook diagnostics before the final status check
      ansible.builtin.set_stats:
        data:
          azure_runbook_job_name: "{{ azure_job_name }}"
          azure_runbook_status: "{{ azure_job_status.json.properties.status }}"
          azure_runbook_error_details: "{{ azure_error_stream_text }}"
      tags:
        - azure
        - diagnostics

    - name: Assert Azure Automation job completed successfully
      ansible.builtin.assert:
        that:
          - azure_job_status.json.properties.status == 'Completed'
        fail_msg: >-
          Runbook job {{ azure_job_name }} finished with status
          {{ azure_job_status.json.properties.status }}.
          {{ ('Error stream: ' + azure_error_stream_text) if azure_error_stream_text | length > 0 else 'No error stream content was returned by Azure for this job.' }}
      tags:
        - azure
        - run

    - name: Fetch Azure Automation job output stream
      ansible.builtin.uri:
        url: >-
          https://management.azure.com/subscriptions/{{ azure_subscription_id }}/resourceGroups/{{ azure_automation_resource_group }}/providers/Microsoft.Automation/automationAccounts/{{ azure_automation_account }}/jobs/{{ azure_job_name }}/output?api-version={{ azure_arm_api_version }}
        method: GET
        headers:
          Authorization: "Bearer {{ azure_access_token }}"
        return_content: true
        status_code: 200
      register: azure_job_output
      tags:
        - azure
        - collect

    - name: Publish Azure runbook results for workflow/email steps
      ansible.builtin.set_stats:
        data:
          azure_runbook_job_name: "{{ azure_job_name }}"
          azure_runbook_status: "{{ azure_job_status.json.properties.status }}"
          azure_runbook_output: "{{ azure_job_output.content }}"
      tags:
        - azure
        - collect

    - name: Display Azure runbook output
      ansible.builtin.debug:
        msg: "{{ azure_job_output.content }}"
      tags:
        - azure
        - collect
