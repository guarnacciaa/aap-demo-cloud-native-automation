# Description: Create or update an Azure Automation job schedule via ARM REST API.
---
- name: Schedule Azure Automation runbook execution
  hosts: localhost
  gather_facts: false
  collections:
    - ansible.builtin

  vars:
    # When running locally, these come from demo_variables.yml (vault mappings).
    # When running as an AAP job template with the Azure Service Principal
    # credential attached, AAP injects AZURE_SUBSCRIPTION_ID, AZURE_CLIENT_ID,
    # AZURE_SECRET, and AZURE_TENANT as environment variables — use those as
    # fallbacks so the playbook works in both execution contexts.
    azure_subscription_id: "{{ azure_subscription_id | default(lookup('env', 'AZURE_SUBSCRIPTION_ID')) }}"
    azure_tenant_id: "{{ azure_tenant_id | default(lookup('env', 'AZURE_TENANT')) }}"
    azure_client_id: "{{ azure_client_id | default(lookup('env', 'AZURE_CLIENT_ID')) }}"
    azure_client_secret: "{{ azure_client_secret | default(lookup('env', 'AZURE_SECRET')) }}"
    azure_automation_resource_group: "{{ azure_automation_resource_group | mandatory }}"
    azure_automation_account: "{{ azure_automation_account | mandatory }}"
    azure_runbook_name: "{{ azure_runbook_name | mandatory }}"
    azure_job_schedule_name: "{{ azure_job_schedule_name | mandatory }}"
    azure_schedule_start_time: "{{ azure_schedule_start_time | mandatory }}"
    azure_schedule_frequency: "{{ azure_schedule_frequency | default('Hour') }}"
    azure_schedule_interval: "{{ azure_schedule_interval | default(24) }}"
    azure_arm_api_version: "2024-10-23"

  tasks:
    - name: Obtain Azure AD access token for Resource Manager
      ansible.builtin.uri:
        url: "https://login.microsoftonline.com/{{ azure_tenant_id }}/oauth2/v2.0/token"
        method: POST
        body_format: form-urlencoded
        body:
          grant_type: client_credentials
          client_id: "{{ azure_client_id }}"
          client_secret: "{{ azure_client_secret }}"
          scope: https://management.azure.com/.default
        status_code: 200
      register: azure_token
      no_log: "{{ demo_no_log | default(true) }}"
      tags:
        - azure
        - auth

    - name: Create or update Azure Automation job schedule
      ansible.builtin.uri:
        url: >-
          https://management.azure.com/subscriptions/{{ azure_subscription_id }}/resourceGroups/{{ azure_automation_resource_group }}/providers/Microsoft.Automation/automationAccounts/{{ azure_automation_account }}/jobSchedules/{{ azure_job_schedule_name }}?api-version={{ azure_arm_api_version }}
        method: PUT
        headers:
          Authorization: "Bearer {{ azure_token.json.access_token }}"
          Content-Type: application/json
        body_format: json
        body:
          properties:
            schedule:
              name: "{{ azure_job_schedule_name }}-schedule"
            runbook:
              name: "{{ azure_runbook_name }}"
        status_code:
          - 200
          - 201
      register: azure_schedule
      tags:
        - azure
        - schedule

    - name: Create linked schedule resource (OneTime/recurrence definition)
      ansible.builtin.uri:
        url: >-
          https://management.azure.com/subscriptions/{{ azure_subscription_id }}/resourceGroups/{{ azure_automation_resource_group }}/providers/Microsoft.Automation/automationAccounts/{{ azure_automation_account }}/schedules/{{ azure_job_schedule_name }}-schedule?api-version={{ azure_arm_api_version }}
        method: PUT
        headers:
          Authorization: "Bearer {{ azure_token.json.access_token }}"
          Content-Type: application/json
        body_format: json
        body:
          properties:
            startTime: "{{ azure_schedule_start_time }}"
            interval: "{{ azure_schedule_interval | int }}"
            frequency: "{{ azure_schedule_frequency }}"
            timeZone: UTC
        status_code:
          - 200
          - 201
      tags:
        - azure
        - schedule

    - name: Publish schedule creation result
      ansible.builtin.set_stats:
        data:
          azure_job_schedule_name: "{{ azure_job_schedule_name }}"
          azure_runbook_name: "{{ azure_runbook_name }}"
          azure_schedule_start_time: "{{ azure_schedule_start_time }}"
      tags:
        - azure
        - schedule
