# Description: Create or update an Azure Automation job schedule via ARM REST API.
---
- name: Schedule Azure Automation runbook execution
  hosts: localhost
  gather_facts: true
  collections:
    - ansible.builtin

  vars:
    azure_automation_resource_group: "{{ azure_automation_resource_group | mandatory }}"
    azure_automation_account: "{{ azure_automation_account | mandatory }}"
    azure_runbook_name: "{{ azure_runbook_name | mandatory }}"
    azure_job_schedule_name: "{{ azure_job_schedule_name | mandatory }}"
    azure_schedule_start_time: "{{ azure_schedule_start_time | mandatory }}"
    azure_schedule_frequency: "{{ azure_schedule_frequency | default('Hour') }}"
    azure_schedule_interval: "{{ azure_schedule_interval | default(24) }}"
    azure_arm_api_version: "2024-10-23"
    # See the equivalent vars in azure_runbook_run.yml: azure_runbook_parameters
    # (explicit {Name: Value} dict) and azure_runbook_parameter_values (ordered
    # list, resolved to names below via the runbook's declared position) are
    # the two supported ways to pass parameters to the scheduled job.
    azure_runbook_parameters: "{{ azure_runbook_parameters | default({}) }}"
    azure_runbook_parameter_values: "{{ azure_runbook_parameter_values | default([]) }}"

  pre_tasks:
    - name: Resolve Azure credentials from AAP credential injection or Ansible variables
      # The AAP Azure Service Principal credential injects AZURE_SUBSCRIPTION_ID,
      # AZURE_CLIENT_ID, AZURE_SECRET, and AZURE_TENANT as environment variables.
      # When running locally with demo_variables.yml those Ansible variables are
      # already defined at higher precedence and take priority over the env lookup.
      # Self-referencing in vars: causes infinite recursion in Ansible — set_fact
      # in pre_tasks avoids that by resolving variables at task execution time.
      ansible.builtin.set_fact:
        azure_subscription_id: >-
          {{ azure_subscription_id
             if (azure_subscription_id | default('')) | length > 0
             else lookup('env', 'AZURE_SUBSCRIPTION_ID') }}
        azure_tenant_id: >-
          {{ azure_tenant_id
             if (azure_tenant_id | default('')) | length > 0
             else lookup('env', 'AZURE_TENANT') }}
        azure_client_id: >-
          {{ azure_client_id
             if (azure_client_id | default('')) | length > 0
             else lookup('env', 'AZURE_CLIENT_ID') }}
        azure_client_secret: >-
          {{ azure_client_secret
             if (azure_client_secret | default('')) | length > 0
             else lookup('env', 'AZURE_SECRET') }}
      no_log: "{{ demo_no_log | default(false) }}"
      tags:
        - always

    - name: Compute effective schedule start time and job schedule UUID
      # Azure rejects a schedule whose startTime is less than 5 minutes ahead.
      # Extra vars in AAP have higher precedence than set_fact, so overriding
      # azure_schedule_start_time directly does not work. A separate internal
      # variable (_azure_effective_start_time) avoids the precedence conflict.
      #
      # The jobSchedules ARM endpoint requires a UUID as the resource ID —
      # passing a human-readable name like poc-runbook-schedule returns 404.
      # A deterministic UUID derived from the schedule name ensures idempotency:
      # re-running the playbook with the same schedule name produces the same UUID.
      ansible.builtin.set_fact:
        _azure_effective_start_time: "{{ '%Y-%m-%dT%H:%M:%SZ' | strftime(ansible_date_time.epoch | int + 600) }}"
        _azure_job_schedule_uuid: "{{ azure_job_schedule_name | to_uuid }}"
      tags:
        - always

  tasks:
    - name: Obtain Azure AD access token via Service Principal (client credentials)
      ansible.builtin.uri:
        url: "https://login.microsoftonline.com/{{ azure_tenant_id }}/oauth2/v2.0/token"
        method: POST
        body_format: form-urlencoded
        body:
          grant_type: client_credentials
          client_id: "{{ azure_client_id }}"
          client_secret: "{{ azure_client_secret }}"
          scope: https://management.azure.com/.default
        status_code: 200
      register: azure_token_sp
      when: azure_auth_mode | default('service_principal') == 'service_principal'
      no_log: "{{ demo_no_log | default(false) }}"
      tags:
        - azure
        - auth

    - name: Obtain Azure AD access token via Managed Identity (IMDS)
      # Only works when this task executes on an Azure resource (VM/VMSS/AKS node/
      # AAP execution node) with a system- or user-assigned identity enabled.
      ansible.builtin.uri:
        url: "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://management.azure.com/"
        method: GET
        headers:
          Metadata: "true"
        status_code: 200
      register: azure_token_msi
      when: azure_auth_mode | default('service_principal') == 'msi'
      tags:
        - azure
        - auth

    - name: Normalize Azure access token regardless of auth mode
      ansible.builtin.set_fact:
        azure_access_token: >-
          {{ (azure_token_sp.json.access_token) if (azure_auth_mode | default('service_principal') == 'service_principal') else (azure_token_msi.json.access_token) }}
      no_log: "{{ demo_no_log | default(false) }}"
      tags:
        - azure
        - auth

    - name: Create Azure Automation schedule (recurrence definition)
      # The Schedule object must exist before the Job Schedule that references it.
      # Creating the Job Schedule first results in a 404 from the ARM API.
      ansible.builtin.uri:
        url: >-
          https://management.azure.com/subscriptions/{{ azure_subscription_id }}/resourceGroups/{{ azure_automation_resource_group }}/providers/Microsoft.Automation/automationAccounts/{{ azure_automation_account }}/schedules/{{ azure_job_schedule_name }}-schedule?api-version={{ azure_arm_api_version }}
        method: PUT
        headers:
          Authorization: "Bearer {{ azure_access_token }}"
          Content-Type: application/json
        body_format: json
        body:
          properties:
            startTime: "{{ _azure_effective_start_time }}"
            interval: "{{ azure_schedule_interval | int }}"
            frequency: "{{ azure_schedule_frequency }}"
            timeZone: UTC
        status_code:
          - 200
          - 201
      tags:
        - azure
        - schedule

    # Same resolution as azure_runbook_run.yml: Azure Automation always binds
    # parameters by name, so positional values must be mapped to the runbook's
    # declared parameter names (via their zero-based `position`) before being
    # sent to the jobSchedules API.
    - name: Retrieve runbook definition to resolve positional parameter names
      ansible.builtin.uri:
        url: >-
          https://management.azure.com/subscriptions/{{ azure_subscription_id }}/resourceGroups/{{ azure_automation_resource_group }}/providers/Microsoft.Automation/automationAccounts/{{ azure_automation_account }}/runbooks/{{ azure_runbook_name }}?api-version={{ azure_arm_api_version }}
        method: GET
        headers:
          Authorization: "Bearer {{ azure_access_token }}"
        status_code: 200
      register: azure_runbook_definition
      when: azure_runbook_parameter_values | length > 0
      tags:
        - azure
        - schedule

    - name: Extract parameter names ordered by their declared position
      ansible.builtin.set_fact:
        azure_runbook_parameter_names: >-
          {{
            azure_runbook_definition.json.properties.parameters
            | default({})
            | dict2items
            | sort(attribute='value.position')
            | map(attribute='key')
            | list
          }}
      when: azure_runbook_parameter_values | length > 0
      tags:
        - azure
        - schedule

    - name: Validate positional value count matches the runbook's declared parameters
      ansible.builtin.assert:
        that:
          - azure_runbook_parameter_values | length == azure_runbook_parameter_names | length
        fail_msg: >-
          azure_runbook_parameter_values supplies {{ azure_runbook_parameter_values | length }}
          value(s), but runbook {{ azure_runbook_name }} declares
          {{ azure_runbook_parameter_names | length }} parameter(s):
          {{ azure_runbook_parameter_names | join(', ') }}. Fix the list order/count,
          or use azure_runbook_parameters with explicit names instead.
      when: azure_runbook_parameter_values | length > 0
      tags:
        - azure
        - schedule

    - name: Build the named parameters dictionary from positional values
      ansible.builtin.set_fact:
        azure_runbook_parameters: "{{ dict(azure_runbook_parameter_names | zip(azure_runbook_parameter_values)) }}"
      when: azure_runbook_parameter_values | length > 0
      no_log: "{{ demo_no_log | default(false) }}"
      tags:
        - azure
        - schedule

    - name: Link runbook to schedule via Azure Automation job schedule
      # The jobSchedules ARM endpoint requires a UUID as the resource ID.
      # Using the schedule name as the ID returns 404 regardless of API version.
      # _azure_job_schedule_uuid is a deterministic UUID derived from the
      # schedule name — idempotent across re-runs with the same schedule name.
      ansible.builtin.uri:
        url: >-
          https://management.azure.com/subscriptions/{{ azure_subscription_id }}/resourceGroups/{{ azure_automation_resource_group }}/providers/Microsoft.Automation/automationAccounts/{{ azure_automation_account }}/jobSchedules/{{ _azure_job_schedule_uuid }}?api-version={{ azure_arm_api_version }}
        method: PUT
        headers:
          Authorization: "Bearer {{ azure_access_token }}"
          Content-Type: application/json
        body_format: json
        body:
          properties:
            schedule:
              name: "{{ azure_job_schedule_name }}-schedule"
            runbook:
              name: "{{ azure_runbook_name }}"
            parameters: "{{ azure_runbook_parameters | default({}) }}"
        status_code:
          - 200
          - 201
      register: azure_schedule
      no_log: "{{ demo_no_log | default(false) }}"
      tags:
        - azure
        - schedule

    - name: Publish schedule creation result
      ansible.builtin.set_stats:
        data:
          azure_job_schedule_name: "{{ azure_job_schedule_name }}"
          azure_runbook_name: "{{ azure_runbook_name }}"
          azure_schedule_start_time: "{{ _azure_effective_start_time }}"
      tags:
        - azure
        - schedule
