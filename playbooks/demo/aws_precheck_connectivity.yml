# Description: Read-only credential and connectivity check for AWS SSM.
# Confirms the injected AWS IAM credentials can authenticate and, when
# aws_ssm_target_instance_id is set, that the configured SSM target instance
# is registered and online, before any Automation document is started or
# scheduled. The instance check is skipped for documents that orchestrate AWS
# API calls directly instead of running commands on an instance (for example
# against an EKS cluster). Never starts, registers, or deletes anything.
---
- name: Check AWS credentials and SSM target connectivity
  hosts: localhost
  gather_facts: false
  collections:
    - ansible.builtin

  vars:
    aws_region: "{{ aws_region | default('us-east-1') }}"
    # `trim` matters here: a stray leading/trailing space (e.g. left over in
    # a job template extra_vars field or a Survey answer) makes `length > 0`
    # true so the instance check below is NOT skipped, but the whitespace is
    # then silently swallowed by ansible.builtin.command's shell-like
    # argument splitting, sending AWS an empty Values[0] and failing with
    # "Invalid length for parameter Filters[0].Values[0], value: 0".
    aws_ssm_target_instance_id: "{{ (aws_ssm_target_instance_id | default('')) | trim }}"

  environment:
    # AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY are injected automatically by
    # the AAP Amazon Web Services credential; do not redeclare them here or the
    # play fails when aws_access_key is undefined in the AAP execution context.
    AWS_DEFAULT_REGION: "{{ aws_region | default('us-east-1') }}"

  tasks:
    - name: Confirm AWS credentials can authenticate
      # sts get-caller-identity fails outright (non-zero rc) on invalid/expired
      # credentials, so a successful call already proves AWS auth works.
      ansible.builtin.command:
        cmd: >-
          aws sts get-caller-identity
          --region {{ aws_region }}
          --output json
      register: aws_caller_check
      changed_when: false
      tags:
        - aws
        - precheck

    - name: Parse caller identity
      ansible.builtin.set_fact:
        aws_caller_identity: "{{ aws_caller_check.stdout | from_json }}"
      tags:
        - aws
        - precheck

    # aws_ssm_target_instance_id is optional: skip the instance
    # registration/PingStatus check entirely for documents that orchestrate
    # AWS API calls directly instead of running commands on an SSM-managed
    # instance (for example against an EKS cluster).
    - name: Describe SSM registration status of the target instance
      ansible.builtin.command:
        cmd: >-
          aws ssm describe-instance-information
          --filters Key=InstanceIds,Values={{ aws_ssm_target_instance_id }}
          --region {{ aws_region }}
          --output json
      register: ssm_instance_check
      changed_when: false
      when: aws_ssm_target_instance_id | length > 0
      tags:
        - aws
        - precheck

    - name: Parse SSM instance information
      ansible.builtin.set_fact:
        ssm_instance_info: "{{ (ssm_instance_check.stdout | from_json).InstanceInformationList | default([]) }}"
      when: aws_ssm_target_instance_id | length > 0
      tags:
        - aws
        - precheck

    - name: Assert the target instance is registered with SSM and online
      ansible.builtin.assert:
        that:
          - ssm_instance_info | length == 1
          - ssm_instance_info[0].PingStatus == 'Online'
        fail_msg: >-
          Instance {{ aws_ssm_target_instance_id }} is not registered with SSM
          or its agent is not Online (found: {{ ssm_instance_info[0].PingStatus
          | default('not registered') }}). Check the instance has the SSM
          agent installed, IAM instance profile with
          AmazonSSMManagedInstanceCore attached, and network path to the SSM
          endpoints (see docs/setup.md).
      when: aws_ssm_target_instance_id | length > 0
      tags:
        - aws
        - precheck

    - name: Report connectivity check results
      ansible.builtin.debug:
        msg:
          - "AWS: authenticated as {{ aws_caller_identity.Arn }} in account {{ aws_caller_identity.Account }} (region {{ aws_region }})."
          - >-
            {{ ('SSM target ' + aws_ssm_target_instance_id + ': PingStatus ' + ssm_instance_info[0].PingStatus + ', agent version ' + ssm_instance_info[0].AgentVersion + ', platform ' + ssm_instance_info[0].PlatformType + '.')
               if aws_ssm_target_instance_id | length > 0
               else 'No SSM-managed instance target configured — document does not run commands on an instance via the SSM agent.' }}
      tags:
        - aws
        - precheck

    - name: Publish connectivity check results for workflow/email steps
      ansible.builtin.set_stats:
        data:
          aws_precheck_account_id: "{{ aws_caller_identity.Account }}"
          aws_precheck_ssm_ping_status: "{{ ssm_instance_info[0].PingStatus if aws_ssm_target_instance_id | length > 0 else 'not_applicable' }}"
      tags:
        - aws
        - precheck
