# Description: Read-only pre-flight check for the Azure runbook execution demo.
# Confirms the runbook is published and reports its most recent jobs plus the
# job name pattern that "Azure - Run Runbook and collect output" would create.
# Never PUTs a job — safe to run repeatedly, including against a customer's
# pre-existing Automation Account.
---
- name: Preview the Azure Automation runbook that would be executed
  hosts: localhost
  gather_facts: true
  collections:
    - ansible.builtin

  vars:
    azure_automation_resource_group: "{{ azure_automation_resource_group | mandatory }}"
    azure_automation_account: "{{ azure_automation_account | mandatory }}"
    azure_runbook_name: "{{ azure_runbook_name | mandatory }}"
    azure_arm_api_version: "2024-10-23"
    # Same naming pattern azure_runbook_run.yml uses — shown here for preview
    # only, never actually created.
    azure_next_job_name: "aap-{{ azure_runbook_name }}-{{ ansible_date_time.epoch }}"
    # Optional: same positional-values input as azure_runbook_run.yml, previewed
    # here (name/type/position resolution only — never starts a job) so an
    # operator can verify the mapping before running the real job template.
    azure_runbook_parameter_values: "{{ azure_runbook_parameter_values | default([]) }}"

  pre_tasks:
    - name: Resolve Azure credentials from AAP credential injection or Ansible variables
      # The AAP Azure Service Principal credential injects AZURE_SUBSCRIPTION_ID,
      # AZURE_CLIENT_ID, AZURE_SECRET, and AZURE_TENANT as environment variables.
      # When running locally with demo_variables.yml those Ansible variables are
      # already defined at higher precedence and take priority over the env lookup.
      ansible.builtin.set_fact:
        azure_subscription_id: >-
          {{ azure_subscription_id
             if (azure_subscription_id | default('')) | length > 0
             else lookup('env', 'AZURE_SUBSCRIPTION_ID') }}
        azure_tenant_id: >-
          {{ azure_tenant_id
             if (azure_tenant_id | default('')) | length > 0
             else lookup('env', 'AZURE_TENANT') }}
        azure_client_id: >-
          {{ azure_client_id
             if (azure_client_id | default('')) | length > 0
             else lookup('env', 'AZURE_CLIENT_ID') }}
        azure_client_secret: >-
          {{ azure_client_secret
             if (azure_client_secret | default('')) | length > 0
             else lookup('env', 'AZURE_SECRET') }}
      no_log: "{{ demo_no_log | default(false) }}"
      tags:
        - always

  tasks:
    - name: Obtain Azure AD access token via Service Principal (client credentials)
      ansible.builtin.uri:
        url: "https://login.microsoftonline.com/{{ azure_tenant_id }}/oauth2/v2.0/token"
        method: POST
        body_format: form-urlencoded
        body:
          grant_type: client_credentials
          client_id: "{{ azure_client_id }}"
          client_secret: "{{ azure_client_secret }}"
          scope: https://management.azure.com/.default
        status_code: 200
      register: azure_token_sp
      when: azure_auth_mode | default('service_principal') == 'service_principal'
      no_log: "{{ demo_no_log | default(false) }}"
      tags:
        - azure
        - preview

    - name: Obtain Azure AD access token via Managed Identity (IMDS)
      # Only works when this task executes on an Azure resource (VM/VMSS/AKS node/
      # AAP execution node) with a system- or user-assigned identity enabled.
      ansible.builtin.uri:
        url: "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://management.azure.com/"
        method: GET
        headers:
          Metadata: "true"
        status_code: 200
      register: azure_token_msi
      when: azure_auth_mode | default('service_principal') == 'msi'
      tags:
        - azure
        - preview

    - name: Normalize Azure access token regardless of auth mode
      ansible.builtin.set_fact:
        azure_access_token: >-
          {{ (azure_token_sp.json.access_token) if (azure_auth_mode | default('service_principal') == 'service_principal') else (azure_token_msi.json.access_token) }}
      no_log: "{{ demo_no_log | default(false) }}"
      tags:
        - azure
        - preview

    - name: Retrieve runbook definition
      ansible.builtin.uri:
        url: >-
          https://management.azure.com/subscriptions/{{ azure_subscription_id
          }}/resourceGroups/{{ azure_automation_resource_group
          }}/providers/Microsoft.Automation/automationAccounts/{{ azure_automation_account
          }}/runbooks/{{ azure_runbook_name }}?api-version={{ azure_arm_api_version }}
        method: GET
        headers:
          Authorization: "Bearer {{ azure_access_token }}"
        status_code: 200
      register: runbook_check
      tags:
        - azure
        - preview

    - name: Assert the runbook is published and ready to run
      ansible.builtin.assert:
        that:
          - runbook_check.json.properties.state == 'Published'
        fail_msg: >-
          Runbook {{ azure_runbook_name }} is in state
          {{ runbook_check.json.properties.state }}, not Published. Run
          01_azure_setup.yml (or publish it manually) before launching
          Azure - Run Runbook and collect output.
      tags:
        - azure
        - preview

    # runbook_check was already fetched above to check publish state; its
    # properties.parameters carries each declared parameter's type,
    # isMandatory, position, and defaultValue — reused here instead of an
    # extra API call, sorted by position so it mirrors the argument order a
    # customer would describe informally (e.g. "value 1, value 2, ...").
    - name: Extract declared runbook parameters ordered by position
      ansible.builtin.set_fact:
        azure_runbook_declared_parameters: >-
          {{
            runbook_check.json.properties.parameters
            | default({})
            | dict2items
            | sort(attribute='value.position')
          }}
      tags:
        - azure
        - preview

    # Python runbooks (runbookType Python2/Python3) never populate
    # properties.parameters — an empty list here does NOT mean the runbook
    # takes no input, only that Azure does not expose declared names for
    # Python. See azure_runbook_run.yml for the full rationale: parameters
    # are positional only, mapped to sys.argv by dict order, not by key text.
    - name: Detect whether the target runbook is a Python runbook
      ansible.builtin.set_fact:
        azure_runbook_is_python: "{{ (runbook_check.json.properties.runbookType | default('')) is match('Python') }}"
      tags:
        - azure
        - preview

    # Only relevant when the operator supplied azure_runbook_parameter_values
    # to check the name mapping before running the real job template — this
    # playbook never starts a job, so a mismatch here is safe to surface as a
    # simple report line rather than a hard failure.
    # The join() happens inside this same template (not in the debug task
    # below) because rendering a Jinja list back out through set_fact here
    # would otherwise produce its Python repr as a plain string (e.g.
    # "['A', 'B']"), which a later | join() would then iterate character by
    # character instead of element by element.
    - name: Format a human-readable summary line per declared parameter
      ansible.builtin.set_fact:
        azure_runbook_parameter_summary: >-
          {%- set lines = [] -%}
          {%- for item in azure_runbook_declared_parameters -%}
          {%- set _ = lines.append(
            item.key ~ ' (position=' ~ item.value.position
            ~ ', type=' ~ item.value.type
            ~ ', mandatory=' ~ (item.value.isMandatory | default(false)) ~ ')'
          ) -%}
          {%- endfor -%}
          {{ lines | join('; ') }}
      tags:
        - azure
        - preview

    - name: Resolve positional values against declared parameter names (preview only)
      ansible.builtin.set_fact:
        azure_runbook_resolved_parameters: >-
          {{
            dict(
              (
                (range(1, azure_runbook_parameter_values | length + 1)
                 | map('string') | map('regex_replace', '(.+)', 'param\1') | list)
                if (azure_runbook_is_python | default(false))
                else (azure_runbook_declared_parameters | map(attribute='key') | list)
              )
              | zip(azure_runbook_parameter_values)
            )
          }}
        azure_runbook_parameter_count_matches: >-
          {{
            true
            if (azure_runbook_is_python | default(false))
            else (azure_runbook_parameter_values | length == azure_runbook_declared_parameters | length)
          }}
      when: azure_runbook_parameter_values | length > 0
      no_log: "{{ demo_no_log | default(false) }}"
      tags:
        - azure
        - preview

    - name: List recent jobs for the runbook's Automation Account
      # No $filter on runbookName is applied here: the jobs list endpoint
      # filters on complex OData expressions inconsistently across API
      # versions, so the raw list is fetched and filtered client-side below.
      ansible.builtin.uri:
        url: >-
          https://management.azure.com/subscriptions/{{ azure_subscription_id
          }}/resourceGroups/{{ azure_automation_resource_group
          }}/providers/Microsoft.Automation/automationAccounts/{{ azure_automation_account
          }}/jobs?api-version={{ azure_arm_api_version }}
        method: GET
        headers:
          Authorization: "Bearer {{ azure_access_token }}"
        status_code: 200
      register: jobs_check
      tags:
        - azure
        - preview

    - name: Build list of recent jobs for this runbook
      ansible.builtin.set_fact:
        azure_recent_runbook_jobs: >-
          {{
            jobs_check.json.value
            | selectattr('properties.runbook.name', 'equalto', azure_runbook_name)
            | list
          }}
      tags:
        - azure
        - preview

    - name: Report Azure runbook preview
      ansible.builtin.debug:
        msg:
          - "Runbook: {{ azure_runbook_name }} (state: {{ runbook_check.json.properties.state }}, type: {{ runbook_check.json.properties.runbookType }})"
          - "Next job name that Azure - Run Runbook and collect output would create: {{ azure_next_job_name }}"
          - >-
            Recent jobs for this runbook ({{ azure_recent_runbook_jobs | length }}):
            {{ azure_recent_runbook_jobs | map(attribute='name') | list | join(', ') if azure_recent_runbook_jobs | length > 0 else 'none found' }}
          - >-
            {{
              'Python runbook: Azure does not expose declared parameter names for Python (properties.parameters is always empty). Parameters are positional only, mapped to sys.argv by dict order — the key text itself is irrelevant.'
              if (azure_runbook_is_python | default(false))
              else (
                'Declared parameters (' ~ (azure_runbook_declared_parameters | length) ~ '), ordered by position: '
                ~ (azure_runbook_parameter_summary if azure_runbook_declared_parameters | length > 0 else 'none declared')
              )
            }}
          - >-
            {{ ('Positional mapping from azure_runbook_parameter_values: ' + (azure_runbook_resolved_parameters | to_nice_json) +
               (' (WARNING: value count does not match declared parameter count)' if not (azure_runbook_parameter_count_matches | default(true)) else ''))
               if azure_runbook_parameter_values | length > 0
               else 'azure_runbook_parameter_values not set — no positional mapping to preview.' }}
      tags:
        - azure
        - preview

    - name: Publish runbook preview results for workflow/email steps
      ansible.builtin.set_stats:
        data:
          azure_preview_runbook_state: "{{ runbook_check.json.properties.state }}"
          azure_preview_next_job_name: "{{ azure_next_job_name }}"
          azure_preview_recent_job_count: "{{ azure_recent_runbook_jobs | length }}"
          azure_preview_declared_parameter_names: "{{ azure_runbook_declared_parameters | map(attribute='key') | list }}"
      tags:
        - azure
        - preview
