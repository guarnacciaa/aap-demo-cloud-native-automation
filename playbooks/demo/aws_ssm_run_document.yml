# Description: Execute AWS SSM Automation document via AWS CLI and collect outputs.
# No certified SSM execution module is indexed; aws cli is used intentionally.
# aws_ssm_target_instance_id is optional: only relevant for documents that run
# commands on an SSM-managed instance via the agent. Documents that
# orchestrate AWS API calls directly (for example against an EKS cluster)
# take their real parameters from aws_ssm_document_parameters instead.
---
- name: Run AWS SSM Automation document and collect output
  hosts: localhost
  gather_facts: false
  collections:
    - ansible.builtin

  vars:
    aws_region: "{{ aws_region | default('us-east-1') }}"
    aws_ssm_document_name: "{{ aws_ssm_document_name | mandatory }}"
    # `trim` matters here: a stray leading/trailing space (e.g. left over in
    # a job template extra_vars field or a Survey answer) makes `length > 0`
    # true so InstanceId is NOT omitted from the parameters, but the
    # whitespace is silently swallowed by ansible.builtin.command's
    # shell-like argument splitting, sending AWS an empty parameter value.
    aws_ssm_target_instance_id: "{{ (aws_ssm_target_instance_id | default('')) | trim }}"
    aws_ssm_document_parameters: "{{ aws_ssm_document_parameters | default([]) }}"

  environment:
    # AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY are injected automatically by
    # the AAP Amazon Web Services credential; do not redeclare them here or the
    # play fails when aws_access_key is undefined in the AAP execution context.
    AWS_DEFAULT_REGION: "{{ aws_region | default('us-east-1') }}"

  tasks:
    # AWS SSM Automation documents define their own parameter schema.
    # InstanceId is only meaningful for documents that run commands on an
    # SSM-managed instance via the agent; documents that call AWS APIs
    # directly (e.g. against an EKS cluster) take arbitrary parameters
    # instead, supplied via aws_ssm_document_parameters.
    - name: Compute the parameters for start-automation-execution
      ansible.builtin.set_fact:
        aws_ssm_all_parameters: >-
          {{
            (
              (['InstanceId=' + aws_ssm_target_instance_id] if aws_ssm_target_instance_id | length > 0 else [])
              + aws_ssm_document_parameters
            ) | join(',')
          }}
      tags:
        - aws
        - run

    - name: Start SSM Automation execution
      ansible.builtin.command:
        cmd: >-
          aws ssm start-automation-execution
          --document-name {{ aws_ssm_document_name }}
          {{ ('--parameters ' + aws_ssm_all_parameters) if aws_ssm_all_parameters | length > 0 else '' }}
          --region {{ aws_region }}
          --output json
      register: ssm_start
      changed_when: true
      tags:
        - aws
        - run

    - name: Parse SSM automation execution ID
      ansible.builtin.set_fact:
        ssm_execution_id: "{{ (ssm_start.stdout | from_json).AutomationExecutionId }}"
      tags:
        - aws
        - run

    - name: Wait until SSM Automation execution reaches terminal state
      ansible.builtin.command:
        cmd: >-
          aws ssm get-automation-execution
          --automation-execution-id {{ ssm_execution_id }}
          --region {{ aws_region }}
          --output json
      register: ssm_status
      until: (ssm_status.stdout | from_json).AutomationExecution.AutomationExecutionStatus in ['Success', 'Failed', 'Cancelled', 'TimedOut']
      retries: 60
      delay: 15
      changed_when: false
      tags:
        - aws
        - run

    - name: Assert SSM Automation execution succeeded
      ansible.builtin.assert:
        that:
          - (ssm_status.stdout | from_json).AutomationExecution.AutomationExecutionStatus == 'Success'
        fail_msg: >-
          SSM execution {{ ssm_execution_id }} finished with status
          {{ (ssm_status.stdout | from_json).AutomationExecution.AutomationExecutionStatus }}.
      tags:
        - aws
        - run

    - name: Publish SSM execution results for workflow/email steps
      ansible.builtin.set_stats:
        data:
          aws_ssm_execution_id: "{{ ssm_execution_id }}"
          aws_ssm_status: "{{ (ssm_status.stdout | from_json).AutomationExecution.AutomationExecutionStatus }}"
          aws_ssm_outputs: "{{ (ssm_status.stdout | from_json).AutomationExecution.Outputs | default({}) }}"
      tags:
        - aws
        - collect

    - name: Display SSM execution outputs
      ansible.builtin.debug:
        var: (ssm_status.stdout | from_json).AutomationExecution.Outputs
      tags:
        - aws
        - collect
