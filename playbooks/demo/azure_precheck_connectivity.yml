# Description: Read-only credential and connectivity check for the Azure Automation Account.
# Confirms the token acquisition path (Service Principal or Managed Identity)
# works and that the configured Automation Account is reachable, before any
# runbook job is started or scheduled. Never PUTs, POSTs, or DELETEs anything.
---
- name: Check Azure Automation Account credentials and API connectivity
  hosts: localhost
  gather_facts: false
  collections:
    - ansible.builtin

  vars:
    azure_automation_resource_group: "{{ azure_automation_resource_group | mandatory }}"
    azure_automation_account: "{{ azure_automation_account | mandatory }}"
    azure_arm_api_version: "2024-10-23"

  pre_tasks:
    - name: Resolve Azure credentials from AAP credential injection or Ansible variables
      # The AAP Azure Service Principal credential injects AZURE_SUBSCRIPTION_ID,
      # AZURE_CLIENT_ID, AZURE_SECRET, and AZURE_TENANT as environment variables.
      # When running locally with demo_variables.yml those Ansible variables are
      # already defined at higher precedence and take priority over the env lookup.
      ansible.builtin.set_fact:
        azure_subscription_id: >-
          {{ azure_subscription_id
             if (azure_subscription_id | default('')) | length > 0
             else lookup('env', 'AZURE_SUBSCRIPTION_ID') }}
        azure_tenant_id: >-
          {{ azure_tenant_id
             if (azure_tenant_id | default('')) | length > 0
             else lookup('env', 'AZURE_TENANT') }}
        azure_client_id: >-
          {{ azure_client_id
             if (azure_client_id | default('')) | length > 0
             else lookup('env', 'AZURE_CLIENT_ID') }}
        azure_client_secret: >-
          {{ azure_client_secret
             if (azure_client_secret | default('')) | length > 0
             else lookup('env', 'AZURE_SECRET') }}
      no_log: "{{ demo_no_log | default(false) }}"
      tags:
        - always

    - name: Validate azure_subscription_id is set
      ansible.builtin.assert:
        that:
          - azure_subscription_id is defined
          - azure_subscription_id != "CHANGE_ME"
        fail_msg: >-
          Set azure_subscription_id in demo_variables.yml (or as a job
          template extra variable) before running this connectivity check.
      tags:
        - always

  tasks:
    - name: Obtain Azure AD access token via Service Principal (client credentials)
      ansible.builtin.uri:
        url: "https://login.microsoftonline.com/{{ azure_tenant_id }}/oauth2/v2.0/token"
        method: POST
        body_format: form-urlencoded
        body:
          grant_type: client_credentials
          client_id: "{{ azure_client_id }}"
          client_secret: "{{ azure_client_secret }}"
          scope: https://management.azure.com/.default
        status_code: 200
      register: azure_token_sp
      when: azure_auth_mode | default('service_principal') == 'service_principal'
      no_log: "{{ demo_no_log | default(false) }}"
      tags:
        - azure
        - precheck

    - name: Obtain Azure AD access token via Managed Identity (IMDS)
      # Only works when this task executes on an Azure resource (VM/VMSS/AKS node/
      # AAP execution node) with a system- or user-assigned identity enabled.
      ansible.builtin.uri:
        url: "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://management.azure.com/"
        method: GET
        headers:
          Metadata: "true"
        status_code: 200
      register: azure_token_msi
      when: azure_auth_mode | default('service_principal') == 'msi'
      tags:
        - azure
        - precheck

    - name: Normalize Azure access token regardless of auth mode
      ansible.builtin.set_fact:
        azure_access_token: >-
          {{ (azure_token_sp.json.access_token) if (azure_auth_mode | default('service_principal') == 'service_principal') else (azure_token_msi.json.access_token) }}
      no_log: "{{ demo_no_log | default(false) }}"
      tags:
        - azure
        - precheck

    - name: Retrieve Automation Account metadata to confirm reachability
      ansible.builtin.uri:
        url: >-
          https://management.azure.com/subscriptions/{{ azure_subscription_id
          }}/resourceGroups/{{ azure_automation_resource_group
          }}/providers/Microsoft.Automation/automationAccounts/{{ azure_automation_account
          }}?api-version={{ azure_arm_api_version }}
        method: GET
        headers:
          Authorization: "Bearer {{ azure_access_token }}"
        status_code: 200
      register: automation_account_check
      tags:
        - azure
        - precheck

    - name: Report connectivity check results
      ansible.builtin.debug:
        msg:
          - >-
            Azure: authenticated to subscription {{ azure_subscription_id }}
            via {{ azure_auth_mode | default('service_principal') }}.
          - >-
            Automation Account '{{ azure_automation_account }}' reachable in
            resource group '{{ azure_automation_resource_group }}'
            (location: {{ automation_account_check.json.location }},
            SKU: {{ automation_account_check.json.properties.sku.name }}).
      tags:
        - azure
        - precheck

    - name: Publish connectivity check results for workflow/email steps
      ansible.builtin.set_stats:
        data:
          azure_precheck_subscription_id: "{{ azure_subscription_id }}"
          azure_precheck_account_location: "{{ automation_account_check.json.location }}"
      tags:
        - azure
        - precheck
