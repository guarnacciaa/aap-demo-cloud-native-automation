---
version: 3
build_arg_defaults:
  ANSIBLE_GALAXY_CLI_COLLECTION_OPTS: "-v"
dependencies:
  galaxy:
    collections:
      - name: infra.aap_configuration
        source: https://cloud.redhat.com/api/automation-hub/
      - name: azure.azcollection
        source: https://cloud.redhat.com/api/automation-hub/
      - name: amazon.aws
        source: https://cloud.redhat.com/api/automation-hub/
      - name: community.general
        source: https://cloud.redhat.com/api/automation-hub/
  python:
    - boto3
    - botocore
    - azure-identity
  python_bin: /usr/bin/python3
  system:
    - awscli [platform:rpm]
