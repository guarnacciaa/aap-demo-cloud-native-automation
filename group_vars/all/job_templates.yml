---
# Always-deployed scenario job templates, present in every deployment mode.
# See job_templates_infra.yml for the provisioning/teardown templates that
# only exist when demo_manage_infrastructure is true (lab/dev mode).
controller_templates:
  # --------------------------------------------------------------------------
  # Demo scenario templates
  # --------------------------------------------------------------------------
  - name: Azure - Run Runbook and collect output
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/azure_runbook_run.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      azure_runbook_name: "{{ azure_runbook_name }}"
      azure_automation_account: "{{ azure_automation_account }}"
      azure_automation_resource_group: "{{ azure_automation_resource_group }}"
      # This playbook branches on azure_auth_mode (Service Principal vs
      # Managed Identity token acquisition); without threading it through
      # extra_vars it never reaches the playbook, since group_vars/all/ is not
      # reliably auto-loaded for playbooks/demo/*.yml under AAP's generated
      # inventory.
      azure_auth_mode: "{{ azure_auth_mode }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Azure - Schedule Runbook
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/azure_runbook_schedule.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      azure_automation_resource_group: "{{ azure_automation_resource_group }}"
      azure_automation_account: "{{ azure_automation_account }}"
      azure_runbook_name: "{{ azure_runbook_name }}"
      azure_job_schedule_name: "{{ azure_job_schedule_name }}"
      azure_schedule_start_time: "{{ azure_schedule_start_time }}"
      azure_schedule_frequency: "{{ azure_schedule_frequency }}"
      azure_schedule_interval: "{{ azure_schedule_interval }}"
      # See the comment on Azure - Run Runbook and collect output above: this
      # playbook also branches on azure_auth_mode and must receive it via extra_vars.
      azure_auth_mode: "{{ azure_auth_mode }}"
    labels:
      - "{{ demo_label_name }}"

  - name: AWS - Run SSM document and collect output
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/aws_ssm_run_document.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      aws_ssm_document_name: "{{ aws_ssm_document_name }}"
      # Both optional — see the comment in demo_variables.yml.example. Only
      # aws_ssm_target_instance_id is set for documents that target an
      # SSM-managed instance; aws_ssm_document_parameters carries the real
      # parameters for documents that call AWS APIs directly instead (for
      # example against an EKS cluster).
      aws_ssm_target_instance_id: "{{ aws_ssm_target_instance_id }}"
      aws_ssm_document_parameters: "{{ aws_ssm_document_parameters }}"
      aws_region: "{{ aws_region }}"
    labels:
      - "{{ demo_label_name }}"

  - name: AWS - Schedule SSM via maintenance window
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/aws_ssm_schedule_maintenance.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      aws_region: "{{ aws_region }}"
      aws_ssm_document_name: "{{ aws_ssm_document_name }}"
      # See the comment on AWS - Run SSM document and collect output above:
      # both are optional and mutually complementary.
      aws_ssm_target_instance_id: "{{ aws_ssm_target_instance_id }}"
      aws_ssm_document_parameters: "{{ aws_ssm_document_parameters }}"
      aws_ssm_maintenance_window_id: "{{ aws_ssm_maintenance_window_id }}"
      aws_ssm_maintenance_task_name: "{{ aws_ssm_maintenance_task_name }}"
      aws_ssm_service_role_arn: "{{ aws_ssm_service_role_arn }}"
      aws_account_id: "{{ aws_account_id }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Notify - Email automation results
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/notify_results.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ smtp_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      enable_email_notification: "{{ enable_email_notification | default(false) }}"
      # Non-secret SMTP connection settings must be threaded through
      # extra_vars for the same reason as azure_auth_mode above: AAP's
      # generated inventory does not reliably auto-load
      # group_vars/all/demo_variables.yml for playbooks/demo/*.yml, so
      # notify_results.yml would otherwise fail on undefined variables
      # whenever enable_email_notification is true. smtp_username/
      # smtp_password are NOT listed here — the SMTP Credentials credential
      # above (see group_vars/all/credential_types.yml) injects them as
      # extra_vars at run time instead, so the password is never stored in
      # this template's own (plaintext, UI/API-visible) extra_vars.
      smtp_host: "{{ smtp_host }}"
      smtp_port: "{{ smtp_port }}"
      notification_to: "{{ notification_to }}"
      smtp_use_tls: "{{ smtp_use_tls | default(true) }}"
      demo_no_log: "{{ demo_no_log }}"
    labels:
      - "{{ demo_label_name }}"

  # --------------------------------------------------------------------------
  # Dry-run / preview templates — read-only, never wired into any workflow.
  # Useful in both deployment modes, so they stay in the core file rather
  # than job_templates_infra.yml.
  # --------------------------------------------------------------------------

  - name: Azure - Connectivity check (dry run)
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/azure_precheck_connectivity.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      azure_automation_resource_group: "{{ azure_automation_resource_group }}"
      azure_automation_account: "{{ azure_automation_account }}"
      azure_auth_mode: "{{ azure_auth_mode }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Azure - Runbook preview (dry run)
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/azure_runbook_preview.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      azure_automation_resource_group: "{{ azure_automation_resource_group }}"
      azure_automation_account: "{{ azure_automation_account }}"
      azure_runbook_name: "{{ azure_runbook_name }}"
      azure_auth_mode: "{{ azure_auth_mode }}"
    labels:
      - "{{ demo_label_name }}"

  - name: AWS - Connectivity check (dry run)
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/aws_precheck_connectivity.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      aws_region: "{{ aws_region }}"
      aws_ssm_target_instance_id: "{{ aws_ssm_target_instance_id }}"
    labels:
      - "{{ demo_label_name }}"

  - name: AWS - SSM preview (dry run)
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/aws_ssm_preview.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      aws_region: "{{ aws_region }}"
      aws_ssm_document_name: "{{ aws_ssm_document_name }}"
      aws_ssm_target_instance_id: "{{ aws_ssm_target_instance_id }}"
      aws_ssm_document_parameters: "{{ aws_ssm_document_parameters }}"
      aws_ssm_maintenance_window_id: "{{ aws_ssm_maintenance_window_id }}"
      demo_aws_maintenance_window_name: "{{ demo_aws_maintenance_window_name }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Network - Connectivity path check (dry run)
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/precheck_network_path.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    ask_variables_on_launch: true
    extra_vars:
      aws_region: "{{ aws_region }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Azure - Permissions check (dry run)
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/azure_precheck_permissions.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      azure_automation_resource_group: "{{ azure_automation_resource_group }}"
      azure_auth_mode: "{{ azure_auth_mode }}"
    labels:
      - "{{ demo_label_name }}"

  - name: AWS - Permissions check (dry run)
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/aws_precheck_permissions.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      aws_region: "{{ aws_region }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Notify - SMTP preflight check (dry run)
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/precheck_smtp.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ smtp_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      enable_email_notification: "{{ enable_email_notification | default(false) }}"
      # See the comment on Notify - Email automation results above: only the
      # non-secret SMTP settings go here — smtp_username/smtp_password are
      # injected by the SMTP Credentials credential instead.
      smtp_host: "{{ smtp_host }}"
      smtp_port: "{{ smtp_port }}"
      notification_to: "{{ notification_to }}"
      smtp_use_tls: "{{ smtp_use_tls | default(true) }}"
      demo_no_log: "{{ demo_no_log }}"
    labels:
      - "{{ demo_label_name }}"
