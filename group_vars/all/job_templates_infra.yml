---
# Infrastructure lifecycle job templates: only merged into controller_templates
# (see playbooks/aap_config.yml pre_tasks) when demo_manage_infrastructure is
# true. These create and destroy the Azure Automation Account and the AWS
# networking/IAM/EC2 target from scratch, so they must not exist in AAP for
# customer/PoC deployments that reuse existing infrastructure (see docs/setup.md).
#
# Kept under a separate var name (controller_templates_infra) so group_vars
# auto-loading this file does not unconditionally add these templates to the
# main controller_templates list; the merge is opt-in via the flag.
controller_templates_infra:
  # --------------------------------------------------------------------------
  # Setup templates — provision supporting cloud resources before the demo
  # --------------------------------------------------------------------------

  - name: Setup - Azure runbook
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/setup/01_azure_setup.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      # Azure resource identity — required for ARM API calls and validation pre_tasks.
      azure_automation_resource_group: "{{ azure_automation_resource_group }}"
      azure_automation_account: "{{ azure_automation_account }}"
      azure_create_automation_account: "{{ azure_create_automation_account }}"
      azure_resource_group_location: "{{ azure_resource_group_location }}"
      azure_automation_account_sku: "{{ azure_automation_account_sku }}"
      # Runbook identity — used when creating the runbook object and uploading content.
      azure_runbook_name: "{{ azure_runbook_name }}"
      azure_runbook_description: "{{ azure_runbook_description }}"
      # This playbook branches on azure_auth_mode (Service Principal vs Managed
      # Identity token acquisition); without threading it through extra_vars it
      # never reaches the playbook, since group_vars/all/ is not reliably
      # auto-loaded for playbooks/setup/*.yml under AAP's generated inventory.
      azure_auth_mode: "{{ azure_auth_mode }}"
      demo_no_log: "{{ demo_no_log }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Setup - AWS SSM resources
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/setup/02_aws_setup.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      # Region and mode flag — required on every task.
      aws_region: "{{ aws_region }}"
      aws_create_network_resources: "{{ aws_create_network_resources }}"
      # EC2 target instance identity.
      aws_ec2_instance_name: "{{ aws_ec2_instance_name }}"
      aws_ec2_instance_type: "{{ aws_ec2_instance_type }}"
      aws_ec2_ami_id: "{{ aws_ec2_ami_id }}"
      aws_ec2_key_name: "{{ aws_ec2_key_name }}"
      # SSM document and maintenance window identity.
      aws_ssm_document_name: "{{ aws_ssm_document_name }}"
      demo_aws_maintenance_window_name: "{{ demo_aws_maintenance_window_name }}"
      demo_aws_maintenance_window_schedule: "{{ demo_aws_maintenance_window_schedule }}"
      # Bring-your-own network/IAM (used when aws_create_network_resources: false).
      aws_ec2_vpc_subnet_id: "{{ aws_ec2_vpc_subnet_id }}"
      aws_ec2_security_group_ids: "{{ aws_ec2_security_group_ids }}"
      aws_ec2_iam_instance_profile: "{{ aws_ec2_iam_instance_profile }}"
      aws_ssm_service_role_arn: "{{ aws_ssm_service_role_arn }}"
      aws_ec2_assign_public_ip: "{{ aws_ec2_assign_public_ip }}"
      # Create-from-scratch network/IAM names (used when aws_create_network_resources: true).
      aws_vpc_name: "{{ aws_vpc_name }}"
      aws_vpc_cidr: "{{ aws_vpc_cidr }}"
      aws_subnet_name: "{{ aws_subnet_name }}"
      aws_subnet_cidr: "{{ aws_subnet_cidr }}"
      aws_sg_name: "{{ aws_sg_name }}"
      aws_iam_role_name: "{{ aws_iam_role_name }}"
      aws_ssm_service_role_name: "{{ aws_ssm_service_role_name }}"
      demo_no_log: "{{ demo_no_log }}"
    labels:
      - "{{ demo_label_name }}"

  # --------------------------------------------------------------------------
  # Teardown templates — remove supporting cloud resources after the demo
  # --------------------------------------------------------------------------

  - name: Teardown - Azure runbook
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/setup/01_azure_teardown.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      # Confirm is true by default so the workflow teardown works without extra prompts.
      # When launching standalone, override with false if you want the safety guard.
      demo_cleanup_confirm: true
      # Azure resource identity — required for ARM API DELETE calls.
      azure_automation_resource_group: "{{ azure_automation_resource_group }}"
      azure_automation_account: "{{ azure_automation_account }}"
      azure_create_automation_account: "{{ azure_create_automation_account }}"
      azure_runbook_name: "{{ azure_runbook_name }}"
      # Schedule identity — required to clean up objects created by azure_runbook_schedule.yml.
      azure_job_schedule_name: "{{ azure_job_schedule_name }}"
      # See the comment on Setup - Azure runbook above: this playbook also
      # branches on azure_auth_mode and must receive it via extra_vars.
      azure_auth_mode: "{{ azure_auth_mode }}"
      demo_no_log: "{{ demo_no_log }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Teardown - AWS SSM resources
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/setup/02_aws_teardown.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      # Confirm is true by default so the workflow teardown works without extra prompts.
      # When launching standalone, override with false if you want the safety guard.
      demo_cleanup_confirm: true
      # Region and mode flag — required on every task.
      aws_region: "{{ aws_region }}"
      aws_create_network_resources: "{{ aws_create_network_resources }}"
      # Resource identities for the three always-deleted objects.
      aws_ssm_maintenance_window_id: "{{ aws_ssm_maintenance_window_id }}"
      demo_aws_maintenance_window_name: "{{ demo_aws_maintenance_window_name }}"
      aws_ec2_instance_name: "{{ aws_ec2_instance_name }}"
      aws_ssm_document_name: "{{ aws_ssm_document_name }}"
      # IAM and network names (used when aws_create_network_resources: true).
      aws_iam_role_name: "{{ aws_iam_role_name }}"
      aws_ssm_service_role_name: "{{ aws_ssm_service_role_name }}"
      aws_vpc_name: "{{ aws_vpc_name }}"
      aws_vpc_cidr: "{{ aws_vpc_cidr }}"
      aws_sg_name: "{{ aws_sg_name }}"
      demo_no_log: "{{ demo_no_log }}"
    labels:
      - "{{ demo_label_name }}"
