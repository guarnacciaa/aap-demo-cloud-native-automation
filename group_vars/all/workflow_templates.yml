---
# Dispatch role reads controller_workflows for workflow job templates.
#
# Uses simplified_workflow_nodes (string template names + edge lists) which
# avoids module-level issues with the full workflow_nodes / unified_job_template
# dict format. Each node references a job template by name and org; edges are
# expressed as lists of identifiers under success_nodes / failure_nodes / always_nodes.

controller_workflows:
  # --------------------------------------------------------------------------
  # Lifecycle: setup → demo → teardown
  # --------------------------------------------------------------------------

  - name: WF - Demo setup
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    description: >-
      Provision supporting cloud resources in sequence:
      Azure runbook → AWS SSM document, EC2 instance, maintenance window.
      Run once before the demo scenario workflows.
    labels:
      - "{{ demo_label_name }}"
    state: present
    simplified_workflow_nodes:
      - identifier: setup_azure
        unified_job_template: Setup - Azure runbook
        organization: "{{ demo_organization_name }}"
        success_nodes:
          - setup_aws
        failure_nodes: []
        always_nodes: []
      - identifier: setup_aws
        unified_job_template: Setup - AWS SSM resources
        organization: "{{ demo_organization_name }}"
        success_nodes: []
        failure_nodes: []
        always_nodes: []

  - name: WF - Demo teardown
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    description: >-
      Remove demo resources in sequence:
      Azure runbook → AWS SSM resources.
      Requires demo_cleanup_confirm=true passed as extra variable.
    labels:
      - "{{ demo_label_name }}"
    state: present
    simplified_workflow_nodes:
      - identifier: teardown_azure
        unified_job_template: Teardown - Azure runbook
        organization: "{{ demo_organization_name }}"
        success_nodes:
          - teardown_aws
        failure_nodes: []
        always_nodes: []
      - identifier: teardown_aws
        unified_job_template: Teardown - AWS SSM resources
        organization: "{{ demo_organization_name }}"
        success_nodes: []
        failure_nodes: []
        always_nodes: []

  # --------------------------------------------------------------------------
  # Demo scenario workflows
  # --------------------------------------------------------------------------

  - name: WF - Azure Runbook execute and collect
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    labels:
      - "{{ demo_label_name }}"
    state: present
    simplified_workflow_nodes:
      - identifier: run_runbook
        unified_job_template: Azure - Run Runbook and collect output
        organization: "{{ demo_organization_name }}"
        success_nodes:
          - notify
        failure_nodes: []
        always_nodes: []
      - identifier: notify
        unified_job_template: Notify - Email automation results
        organization: "{{ demo_organization_name }}"
        success_nodes: []
        failure_nodes: []
        always_nodes: []

  - name: WF - Azure Runbook schedule
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    labels:
      - "{{ demo_label_name }}"
    state: present
    simplified_workflow_nodes:
      - identifier: schedule_runbook
        unified_job_template: Azure - Schedule Runbook
        organization: "{{ demo_organization_name }}"
        success_nodes: []
        failure_nodes: []
        always_nodes: []

  - name: WF - AWS SSM document execute and collect
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    labels:
      - "{{ demo_label_name }}"
    state: present
    simplified_workflow_nodes:
      - identifier: run_ssm
        unified_job_template: AWS - Run SSM document and collect output
        organization: "{{ demo_organization_name }}"
        success_nodes:
          - notify
        failure_nodes: []
        always_nodes: []
      - identifier: notify
        unified_job_template: Notify - Email automation results
        organization: "{{ demo_organization_name }}"
        success_nodes: []
        failure_nodes: []
        always_nodes: []

  - name: WF - AWS SSM schedule via maintenance window
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    labels:
      - "{{ demo_label_name }}"
    state: present
    simplified_workflow_nodes:
      - identifier: schedule_ssm
        unified_job_template: AWS - Schedule SSM via maintenance window
        organization: "{{ demo_organization_name }}"
        success_nodes: []
        failure_nodes: []
        always_nodes: []
