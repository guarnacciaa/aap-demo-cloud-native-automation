---
controller_workflows:
  # --------------------------------------------------------------------------
  # Lifecycle: setup → demo → teardown
  # --------------------------------------------------------------------------

  - name: WF - Demo setup
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    description: >-
      Provision supporting cloud resources in sequence:
      Azure runbook → AWS SSM document, EC2 instance, maintenance window.
      Run once before the demo scenario workflows.
    labels:
      - "{{ demo_label_name }}"
    workflow_nodes:
      - identifier: setup_azure
        unified_job_template:
          organization:
            name: "{{ demo_organization_name }}"
          name: Setup - Azure runbook
      - identifier: setup_aws
        unified_job_template:
          organization:
            name: "{{ demo_organization_name }}"
          name: Setup - AWS SSM resources
        related:
          - identifier: setup_azure
            type: success

  - name: WF - Demo teardown
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    description: >-
      Remove demo resources in sequence:
      AAP Controller objects (aap_cleanup) → Azure runbook → AWS SSM resources.
      Requires demo_cleanup_confirm=true passed as extra variable.
    labels:
      - "{{ demo_label_name }}"
    workflow_nodes:
      - identifier: teardown_azure
        unified_job_template:
          organization:
            name: "{{ demo_organization_name }}"
          name: Teardown - Azure runbook
      - identifier: teardown_aws
        unified_job_template:
          organization:
            name: "{{ demo_organization_name }}"
          name: Teardown - AWS SSM resources
        related:
          - identifier: teardown_azure
            type: success

  # --------------------------------------------------------------------------
  # Demo scenario workflows
  # --------------------------------------------------------------------------
  - name: WF - Azure Runbook execute and collect
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    labels:
      - "{{ demo_label_name }}"
    workflow_nodes:
      - identifier: run_runbook
        unified_job_template:
          organization:
            name: "{{ demo_organization_name }}"
          name: Azure - Run Runbook and collect output
      - identifier: notify
        unified_job_template:
          organization:
            name: "{{ demo_organization_name }}"
          name: Notify - Email automation results
        related:
          - identifier: run_runbook
            type: success

  - name: WF - Azure Runbook schedule
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    labels:
      - "{{ demo_label_name }}"
    workflow_nodes:
      - identifier: schedule_runbook
        unified_job_template:
          organization:
            name: "{{ demo_organization_name }}"
          name: Azure - Schedule Runbook

  - name: WF - AWS SSM document execute and collect
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    labels:
      - "{{ demo_label_name }}"
    workflow_nodes:
      - identifier: run_ssm
        unified_job_template:
          organization:
            name: "{{ demo_organization_name }}"
          name: AWS - Run SSM document and collect output
      - identifier: notify
        unified_job_template:
          organization:
            name: "{{ demo_organization_name }}"
          name: Notify - Email automation results
        related:
          - identifier: run_ssm
            type: success

  - name: WF - AWS SSM schedule via maintenance window
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    labels:
      - "{{ demo_label_name }}"
    workflow_nodes:
      - identifier: schedule_ssm
        unified_job_template:
          organization:
            name: "{{ demo_organization_name }}"
          name: AWS - Schedule SSM via maintenance window
