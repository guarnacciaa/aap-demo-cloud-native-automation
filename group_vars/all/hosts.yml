---
controller_hosts:
  - name: azure-automation-anchor
    inventory: Azure-Resources
    variables:
      cloud: azure
      automation_account: "{{ azure_automation_account }}"
      runbook_name: "{{ azure_runbook_name }}"

  # aws_ssm_target_instance_id is optional (see demo_variables.yml.example);
  # fall back to the document name as a stable inventory host identifier
  # when the document does not target an SSM-managed instance.
  - name: "{{ aws_ssm_target_instance_id | default(aws_ssm_document_name, true) }}"
    inventory: AWS-Resources
    variables:
      cloud: aws
      ssm_document: "{{ aws_ssm_document_name }}"
      ssm_target_instance_id: "{{ aws_ssm_target_instance_id | default('') }}"
