---
# Custom credential type for the optional SMTP notification step. AAP has no
# built-in "SMTP" credential type, and there is no Controller credential
# mechanism that injects secrets straight into a module's arguments the way
# the built-in Azure/AWS credential types do for azure.azcollection/amazon.aws.
# This custom type closes that gap: its injectors.extra_vars populate
# smtp_username/smtp_password as real Ansible variables at job-run time,
# sourced from the credential's own encrypted-at-rest storage. Unlike a static
# extra_var on a job template (visible in plaintext to anyone with read access
# to that template), a credential's secret input fields are never returned by
# the Controller API/UI in plaintext, before or after this injection.
controller_credential_types:
  - name: SMTP Credentials
    kind: cloud
    inputs:
      fields:
        - id: username
          type: string
          label: SMTP Username
        - id: password
          type: string
          label: SMTP Password
          secret: true
      required:
        - username
        - password
    injectors:
      extra_vars:
        smtp_username: "{{ username }}"
        smtp_password: "{{ password }}"
